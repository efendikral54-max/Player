<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
        }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay></video>

    <script>
        const video = document.getElementById('video');
        let hlsPlayer = null;
        let tsPlayer = null;

        function stopExistingPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; }
            video.src = "";
            video.load();
        }

        function startStream(url) {
            if (!url || url === "null" || url === "") return;
            stopExistingPlayers();

            const urlLower = url.toLowerCase();

            if (urlLower.includes('.ts') || urlLower.includes('output=ts')) {
                if (mpegts.getFeatureList().mseLivePlayback) {
                    tsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
                    tsPlayer.attachMediaElement(video);
                    tsPlayer.load();
                    video.play();
                } else {
                    video.src = url;
                    video.play();
                }
            } else if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            } else {
                video.src = url;
                video.play();
            }
        }

        // Nur einmal beim Start laden
        window.addEventListener('load', function() {
            const url = window.AppInventor ? window.AppInventor.getWebViewString() : "";
            startStream(url);
        });

        // Auf neue URL reagieren
        window.updateStream = function(url) {
            startStream(url);
        }
    </script>
</body>
</html>
