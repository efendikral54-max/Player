<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; }
        video { position:absolute; width:100%; height:100%; object-fit:contain; z-index:1; }
        #spinner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:300; width:60px; height:60px; border:5px solid rgba(255,255,255,0.2); border-top:5px solid #e50914; border-radius:50%; display:none; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
        #msg { position:relative; z-index:100; color:white; font-family:sans-serif; font-size:22px; font-weight:bold; text-align:center; background:rgba(0,0,0,0.7); padding:25px; border-radius:15px; border:2px solid rgba(255,255,255,0.2); }
        #channelInfo { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:200; color:white; font-family:sans-serif; font-size:20px; font-weight:bold; background:rgba(0,0,0,0.75); padding:10px 24px; border-radius:10px; border:2px solid rgba(255,255,255,0.15); display:none; transition:opacity 0.5s; }
        #streamStatus { position:fixed; top:10px; left:10px; z-index:300; font-family:sans-serif; font-size:13px; font-weight:bold; padding:7px 13px; border-radius:8px; display:none; transition:opacity 0.8s; }
        #streamStatus.yukleniyor { background:rgba(0,0,0,0.75); color:#ffcc00; border:1px solid #ffcc00; }
        #streamStatus.basarili   { background:rgba(0,80,0,0.8);  color:#00ff00; border:1px solid #00ff00; }
        #streamStatus.hata       { background:rgba(80,0,0,0.8);  color:#ff4444; border:1px solid #ff4444; }
    </style>
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<div id="spinner"></div>
<div id="msg" style="display:none;"></div>
<div id="channelInfo"></div>
<div id="streamStatus"></div>
<script>
const video       = document.getElementById('video');
const spinner     = document.getElementById('spinner');
const msg         = document.getElementById('msg');
const channelInfo = document.getElementById('channelInfo');
const streamStatus= document.getElementById('streamStatus');

let hasInteracted = false;
let currentCmd = '';
let urlList = [], nameList = [], currentIndex = 0;
let infoTimer = null, statusTimer = null, zappingTimer = null;
let activeUrl = '';
let attemptId = 0;

function showStatus(text, type, dur) {
    if (statusTimer) clearTimeout(statusTimer);
    streamStatus.textContent=text; streamStatus.className=type;
    streamStatus.style.display='block'; streamStatus.style.opacity='1';
    statusTimer = setTimeout(() => {
        streamStatus.style.opacity='0';
        setTimeout(()=>streamStatus.style.display='none',800);
    }, dur||5000);
}
function showChannelInfo(name, index) {
    channelInfo.textContent=(index+1)+'. '+name;
    channelInfo.style.display='block'; channelInfo.style.opacity='1';
    if (infoTimer) clearTimeout(infoTimer);
    infoTimer = setTimeout(()=>{ channelInfo.style.opacity='0'; setTimeout(()=>channelInfo.style.display='none',500); },3000);
}
function forcePlay() {
    hasInteracted=true; video.muted=false; video.volume=1.0;
    video.play().catch(()=>{}); msg.style.display='none';
}
window.addEventListener('click', forcePlay);
window.addEventListener('keydown', e => {
    if (!hasInteracted) forcePlay();
    if (!urlList.length) return;
    if (e.keyCode===40||e.keyCode===229){ currentIndex=(currentIndex+1)%urlList.length; doZap(); }
    else if (e.keyCode===38||e.keyCode===228){ currentIndex=(currentIndex-1+urlList.length)%urlList.length; doZap(); }
});
function doZap() {
    showChannelInfo(nameList[currentIndex]||'?', currentIndex);
    window.AppInventor.setWebViewString('INDEX:'+currentIndex);
    if (zappingTimer) clearTimeout(zappingTimer);
    zappingTimer = setTimeout(()=>startStream(urlList[currentIndex]),100);
}

// ── Alle Player stoppen ──────────────────────────────────
function stopAll() {
    if (window._hls){ try{window._hls.destroy();}catch(e){} window._hls=null; }
    if (window._ts) { try{window._ts.unload();window._ts.detachMediaElement();window._ts.destroy();}catch(e){} window._ts=null; }
    video.oncanplay=null; video.onerror=null;
    video.src=''; video.load();
}

function applyAudio() {
    if (hasInteracted){ video.muted=false; video.volume=1.0; video.play().catch(()=>{}); msg.style.display='none'; }
    else { video.play().catch(()=>{}); msg.innerHTML='Ses için OK tuşuna bas'; msg.style.display='block'; }
}

// ════════════════════════════════════════════════════════
function doHLS(url, onSuccess, onFail) {
    if (!Hls.isSupported()) { onFail(); return; }
    const h = new Hls({
        startLevel: -1, autoStartLoad: true, maxBufferLength: 30,
        manifestLoadingTimeOut: 8000, // Schnellerer Fallback!
        manifestLoadingMaxRetry: 1,
        enableWorker: true, xhrSetup: xhr => { xhr.withCredentials = false; }
    });
    window._hls = h;
    h.loadSource(url); h.attachMedia(video);
    let won = false;

    // Timeout von 16s auf 8s reduziert!
    const timer = setTimeout(() => {
        if (!won){ if(window._hls===h){try{h.destroy();}catch(e){} window._hls=null;} onFail(); }
    }, 8000);

    h.on(Hls.Events.MANIFEST_PARSED, () => {
        if (won) return; won = true; clearTimeout(timer); onSuccess();
        h.off(Hls.Events.ERROR);
        h.on(Hls.Events.ERROR, (e, d) => {
            if (d.fatal && activeUrl === url) {
                try{h.destroy();}catch(e){} window._hls = null;
                setTimeout(() => { if (activeUrl === url) doHLS(url, ()=>{}, ()=>{}); }, 3000);
            }
        });
    });

    h.on(Hls.Events.ERROR, (e, d) => {
        if (d.fatal && !won) { won = true; clearTimeout(timer); if(window._hls===h){try{h.destroy();}catch(e){} window._hls=null;} onFail(); }
    });
}

// ════════════════════════════════════════════════════════
function doTS(url, onSuccess, onFail, maxWait) {
    if (!mpegts.getFeatureList().mseLivePlayback) { onFail(); return; }
    const p = mpegts.createPlayer({ type:'mse', isLive:true, url, config:{ enableWorker:true, enableStashBuffer:false, stashInitialSize:128 } });
    window._ts=p; p.attachMediaElement(video); p.load();
    let won = false;

    function succeed() { if (won) return; won=true; clearTimeout(failTimer); clearInterval(checker); onSuccess(); }
    function failNow() { if (won) return; won=true; clearTimeout(failTimer); clearInterval(checker); try{p.unload();p.detachMediaElement();p.destroy();}catch(e){} if (window._ts===p) window._ts=null; onFail(); }

    const checker = setInterval(() => {
        if (video.readyState >= 2 || (video.buffered.length > 0 && video.buffered.end(0) > 0.5)) { succeed(); }
    }, 400);

    p.on(mpegts.Events.ERROR, failNow);
    const failTimer = setTimeout(failNow, maxWait || 4500); // Schnellerer Fallback! (4.5s statt 9s)
}

// ════════════════════════════════════════════════════════
function doNative(url, onSuccess, onFail) {
    video.src=url; video.load();
    const t = setTimeout(()=>{ video.oncanplay=null; video.onerror=null; onFail(); }, 10000);
    video.oncanplay = ()=>{ clearTimeout(t); onSuccess(); };
    video.onerror   = ()=>{ clearTimeout(t); onFail(); };
}

// ════════════════════════════════════════════════════════
function startStream(url) {
    if (!url) return;
    const id = ++attemptId;
    activeUrl = url.trim();
    stopAll();
    spinner.style.display='block';
    showStatus('⏳ Yükleniyor...','yukleniyor',30000);

    const lo = activeUrl.toLowerCase();
    
    // URL TYPEN
    const isM3U8    = lo.includes('.m3u8');
    const isExtTS   = lo.endsWith('.ts')||lo.includes('extension=ts')||lo.includes('type=m3u_plus');
    const isStalker = lo.includes('live.php')&&lo.includes('mac=');
    const isXtream  = !isM3U8&&!isExtTS&&!isStalker&& /:\d{2,5}\/[^/?#]+\/[^/?#]+\/\d+$/.test(activeUrl);
    
    // CORS BLOCKER ERKENNUNG (Tulix, Proxies etc.)
    const isCorsBlocked = lo.includes('tulix.tv') || lo.includes('proxy.php') || lo.includes('proxy');

    function valid() { return id===attemptId; }
    function win(m)  { if(valid()){ spinner.style.display='none'; showStatus('✅ '+m,'basarili',4000); applyAudio(); } }
    function lose()  { if(valid()){ spinner.style.display='none'; showStatus('❌ Yayın açılamadı veya Desteklenmiyor','hata',8000); } }
    function guard(fn){ return ()=>{ if(valid()) fn(); else stopAll(); }; }

    // AGGRESSIVES ROUTING
    if (isCorsBlocked) {
        // TULIX & PROXY: JavaScript sofort überspringen! Geht direkt ans Android System.
        console.log("CORS-Blocker erkannt -> Nativer Bypass");
        doNative(activeUrl, guard(()=>win('Native')), lose);

    } else if (isXtream || isExtTS || isStalker) {
        // XTREAM & TS: Versuche TS, aber brich nach 4.5s ab, wenn es hängt -> sofort Native!
        console.log("TS/Xtream Stream -> Schneller Fallback");
        doTS(activeUrl,
            guard(()=>win('TS')),
            guard(()=>doNative(activeUrl, guard(()=>win('Native')), guard(()=>doHLS(activeUrl, guard(()=>win('HLS')), lose)))),
            4500 // Nur 4.5 Sekunden warten!
        );

    } else if (isM3U8) {
        // HLS
        doHLS(activeUrl,
            guard(()=>win('HLS')),
            guard(()=>doNative(activeUrl, guard(()=>win('Native')), lose))
        );

    } else {
        // Fallback für Unbekanntes
        doHLS(activeUrl, guard(()=>win('HLS')), guard(()=>doNative(activeUrl, guard(()=>win('Native')), lose)));
    }
}

function handleCommand(cmd) {
    if (!cmd||cmd.startsWith('INDEX:')) return;
    if (cmd.startsWith('SETLIST:')) {
        const p=cmd.slice(8).split('~~~');
        urlList=p[0]?p[0].split('||'):[];
        nameList=p[1]?p[1].split('||'):[];
        currentIndex=p[2]?parseInt(p[2]):0;
        if (urlList[currentIndex]){
            startStream(urlList[currentIndex]);
            showChannelInfo(nameList[currentIndex]||'?',currentIndex);
        }
    } else if (cmd.startsWith('PLAY:')) {
        startStream(cmd.slice(5));
    } else if (cmd.includes('://')) {
        startStream(cmd);
    }
}

setInterval(()=>{
    try{
        const cmd=window.AppInventor.getWebViewString();
        if(cmd&&cmd!==currentCmd){currentCmd=cmd;handleCommand(cmd);}
    }catch(e){}
},300);
</script>
</body>
</html>
