<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; }
        video { position:absolute; width:100%; height:100%; object-fit:contain; z-index:1; }
        #spinner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:300; width:60px; height:60px; border:5px solid rgba(255,255,255,0.2); border-top:5px solid #e50914; border-radius:50%; display:none; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
        #msg { position:relative; z-index:100; color:white; font-family:sans-serif; font-size:22px; font-weight:bold; text-align:center; background:rgba(0,0,0,0.7); padding:25px; border-radius:15px; border:2px solid rgba(255,255,255,0.2); }
        #channelInfo { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:200; color:white; font-family:sans-serif; font-size:20px; font-weight:bold; background:rgba(0,0,0,0.75); padding:10px 24px; border-radius:10px; border:2px solid rgba(255,255,255,0.15); display:none; transition:opacity 0.5s; }
        #streamStatus { position:fixed; top:10px; left:10px; z-index:300; font-family:sans-serif; font-size:13px; font-weight:bold; padding:7px 13px; border-radius:8px; display:none; transition:opacity 0.8s; }
        #streamStatus.yukleniyor { background:rgba(0,0,0,0.75); color:#ffcc00; border:1px solid #ffcc00; }
        #streamStatus.basarili   { background:rgba(0,80,0,0.8);  color:#00ff00; border:1px solid #00ff00; }
        #streamStatus.hata       { background:rgba(80,0,0,0.8);  color:#ff4444; border:1px solid #ff4444; }
    </style>
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<div id="spinner"></div>
<div id="msg" style="display:none;"></div>
<div id="channelInfo"></div>
<div id="streamStatus"></div>

<script>
const video        = document.getElementById('video');
const spinner      = document.getElementById('spinner');
const msg          = document.getElementById('msg');
const channelInfo  = document.getElementById('channelInfo');
const streamStatus = document.getElementById('streamStatus');

let hasInteracted = false;
let currentCmd = '';
let urlList = [], nameList = [], currentIndex = 0;
let infoTimer = null, statusTimer = null, zappingTimer = null;

let activePlayer = null;
let attemptId = 0;

function showStatus(text, type, dur) {
    if (statusTimer) clearTimeout(statusTimer);
    streamStatus.textContent   = text;
    streamStatus.className     = type;
    streamStatus.style.display = 'block';
    streamStatus.style.opacity = '1';
    statusTimer = setTimeout(() => {
        streamStatus.style.opacity = '0';
        setTimeout(() => streamStatus.style.display = 'none', 800);
    }, dur || 5000);
}

function showChannelInfo(name, index) {
    channelInfo.textContent   = (index+1) + '. ' + name;
    channelInfo.style.display = 'block';
    channelInfo.style.opacity = '1';
    if (infoTimer) clearTimeout(infoTimer);
    infoTimer = setTimeout(() => {
        channelInfo.style.opacity = '0';
        setTimeout(() => channelInfo.style.display = 'none', 500);
    }, 3000);
}

function forcePlay() {
    hasInteracted = true;
    video.muted = false; video.volume = 1.0;
    video.play().catch(()=>{});
    msg.style.display = 'none';
}
window.addEventListener('click', forcePlay);

function stopAll() {
    activePlayer = null;
    if (window._hlsInst) { try { window._hlsInst.destroy(); } catch(e){} window._hlsInst = null; }
    if (window._tsInst)  { try { window._tsInst.unload(); window._tsInst.detachMediaElement(); window._tsInst.destroy(); } catch(e){} window._tsInst = null; }
    video.src = ''; video.load();
}

// 🔥 FIX: User-Agent eingebaut
function tryHLS(tryUrl, delayMs) {
    setTimeout(() => {
        if (!Hls.isSupported()) return;

        const h = new Hls({
            enableWorker: true,
            xhrSetup: xhr => {
                xhr.withCredentials = false;
                try {
                    xhr.setRequestHeader("User-Agent", "Mozilla/5.0");
                } catch(e){}
            }
        });

        window._hlsInst = h;
        h.loadSource(tryUrl);
        h.attachMedia(video);

        h.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(()=>{});
            spinner.style.display = 'none';
        });

    }, delayMs || 0);
}

function tryTS(url, delayMs) {
    setTimeout(() => {
        if (!mpegts.getFeatureList().mseLivePlayback) return;
        const p = mpegts.createPlayer({ type:'mse', isLive:true, url });
        window._tsInst = p;
        p.attachMediaElement(video);
        p.load();
        setTimeout(() => {
            if (video.readyState >= 2) {
                video.play().catch(()=>{});
                spinner.style.display = 'none';
            }
        }, 2000);
    }, delayMs || 0);
}

function tryNative(url, delayMs) {
    setTimeout(() => {
        video.src = url;
        video.oncanplay = () => {
            video.play().catch(()=>{});
            spinner.style.display = 'none';
        };
    }, delayMs || 0);
}

function startStream(url) {
    if (!url) return;
    stopAll();
    spinner.style.display = 'block';

    const lo = url.toLowerCase();
    const isXtream  = /:\d{4,5}\/[^/]+\/[^/]+\/\d+$/.test(url);

    if (isXtream) {

        // 🔥 XTREAM FIX
        tryHLS(url + '.m3u8', 0);
        tryHLS(url + '/index.m3u8', 500);
        tryHLS(url, 1000);
        tryTS(url, 1500);
        tryNative(url, 16000);

    } else {

        tryHLS(url, 0);
        tryTS(url, 500);
        tryNative(url, 16000);
    }
}
</script>
</body>
</html>
