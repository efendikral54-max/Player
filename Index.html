<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>

<style>
body, html {
    margin:0; padding:0;
    width:100%; height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
}
video {
    position:absolute;
    width:100%;
    height:100%;
}
#spinner {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:60px; height:60px;
    border:5px solid rgba(255,255,255,0.2);
    border-top:5px solid red;
    border-radius:50%;
    display:none;
    animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<div id="spinner"></div>

<script>
const video = document.getElementById("video");
const spinner = document.getElementById("spinner");

let attemptId = 0;

// ───────────────────────────────
// STOP ALL
// ───────────────────────────────
function stopAll() {
    if (window.hls) { try { window.hls.destroy(); } catch(e){} }
    if (window.ts) {
        try {
            window.ts.unload();
            window.ts.detachMediaElement();
            window.ts.destroy();
        } catch(e){}
    }
    video.src = "";
}

// ───────────────────────────────
// HLS PLAYER
// ───────────────────────────────
function playHLS(url, onSuccess, onFail) {

    if (!Hls.isSupported()) return onFail();

    const hls = new Hls({
        enableWorker: true,
        xhrSetup: function(xhr) {
            xhr.withCredentials = false;
            xhr.setRequestHeader("User-Agent", "Mozilla/5.0");
        }
    });

    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(()=>{});
        onSuccess("HLS");
    });

    hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) {
            try { hls.destroy(); } catch(e){}
            onFail();
        }
    });
}

// ───────────────────────────────
// TS PLAYER
// ───────────────────────────────
function playTS(url, onSuccess, onFail) {

    if (!mpegts.getFeatureList().mseLivePlayback) return onFail();

    const player = mpegts.createPlayer({
        type: 'mse',
        isLive: true,
        url: url
    });

    window.ts = player;

    player.attachMediaElement(video);
    player.load();

    setTimeout(() => {
        if (video.readyState >= 2) {
            video.play().catch(()=>{});
            onSuccess("TS");
        } else {
            try {
                player.destroy();
            } catch(e){}
            onFail();
        }
    }, 2000);
}

// ───────────────────────────────
// NATIVE
// ───────────────────────────────
function playNative(url, onSuccess, onFail) {

    video.src = url;

    video.oncanplay = () => {
        video.play().catch(()=>{});
        onSuccess("Native");
    };

    video.onerror = () => onFail();
}

// ───────────────────────────────
// XTREAM HELPER
// ───────────────────────────────
function getXtreamUrls(url) {

    return [
        url + ".m3u8",
        url + "/index.m3u8",
        url
    ];
}

// ───────────────────────────────
// START STREAM
// ───────────────────────────────
function startStream(url) {

    attemptId++;
    const id = attemptId;

    stopAll();
    spinner.style.display = "block";

    const isXtream = /\/live\//.test(url);

    let attempts = [];

    // ───────── XTREAM FIX ─────────
    if (isXtream) {

        const urls = getXtreamUrls(url);

        attempts = [
            () => playHLS(urls[0], win, next),
            () => playHLS(urls[1], win, next),
            () => playHLS(urls[2], win, next),
            () => playTS(url, win, next),
            () => playNative(url, win, next)
        ];

    } else {

        attempts = [
            () => playHLS(url, win, next),
            () => playTS(url, win, next),
            () => playNative(url, win, next)
        ];
    }

    let index = 0;

    function next() {
        if (id !== attemptId) return;

        index++;
        if (index < attempts.length) {
            attempts[index]();
        } else {
            fail();
        }
    }

    function win(type) {
        if (id !== attemptId) return;
        spinner.style.display = "none";
        console.log("PLAYING:", type);
    }

    function fail() {
        spinner.style.display = "none";
        alert("Stream konnte nicht geladen werden");
    }

    attempts[0]();
}

// ───────────────────────────────
// TEST
// ───────────────────────────────
// Beispiel:
// startStream("http://server:8080/live/user/pass/12345");

</script>

</body>
</html>
