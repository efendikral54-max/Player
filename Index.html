<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        
        #spinner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 300; width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #e50914; border-radius: 50%;
            display: none; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        #msg {
            position: fixed; top: 20px; right: 20px; z-index: 400;
            background: rgba(0,0,0,0.8); color: white;
            padding: 10px 20px; border-radius: 8px; font-size: 16px;
            display: none; border: 1px solid #e50914;
        }

        #info {
            position: fixed; bottom: 30px; left: 30px; z-index: 200;
            background: rgba(0,0,0,0.8); color: white;
            padding: 15px 25px; border-radius: 10px; font-size: 24px;
            display: none; border-left: 5px solid #e50914;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <div id="spinner"></div>
    <div id="msg">Ses için ekrana dokun veya OK tuşuna bas</div>
    <div id="info">Kanal Adı</div>

    <script>
        const video = document.getElementById('video');
        const spinner = document.getElementById('spinner');
        const msg = document.getElementById('msg');
        const info = document.getElementById('info');

        let currentCmd = '';
        let urlList = [];
        let nameList = [];
        let currentIndex = 0;
        let hasInteracted = false;

        let hls = null;
        let tsPlayer = null;

        function showChannelInfo(name, index) {
            info.innerHTML = `<b>${index + 1}.</b> ${name}`;
            info.style.display = 'block';
            setTimeout(() => { info.style.display = 'none'; }, 4000);
        }

        // --- DER NEUE SUPER-PLAYER-CODE ---
        function startStream(url) {
            if (spinner) spinner.style.display = 'block';

            // 1. Alte Player sauber beenden
            if (hls) { hls.destroy(); hls = null; }
            if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; }
            video.src = '';
            video.removeAttribute('src');
            video.load();

            // 2. Ist es eine M3U8 (HLS) Datei oder ein PHP-Proxy?
            if (url.includes('.m3u8') || url.includes('m3u8') || url.includes('.php')) {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        maxBufferLength: 30,
                        liveSyncDuration: 3,
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        if (spinner) spinner.style.display = 'none';
                        handlePlayback();
                    });

                    // Fehlerbehandlung für Tulix und Proxy-Streams
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    // Meistens CORS-Fehler (wie bei Tulix TV!) -> Fallback auf nativen Player
                                    console.log("CORS oder Netzwerkfehler, nutze nativen Fallback");
                                    hls.destroy();
                                    spielNativ(url);
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    // Proxy-Fehler (wie bei Bstelevision!) -> Versuch der Selbstheilung
                                    console.log("Stream hakt, versuche Reparatur...");
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    hls.destroy();
                                    spielNativ(url);
                                    break;
                            }
                        }
                    });
                } else {
                    // Für sehr alte Geräte
                    spielNativ(url);
                }
            } 
            // 3. Ist es ein MPEG-TS Stream (oder hat gar keine Endung wie Fiko4k)
            else {
                if (mpegts.getFeatureList().mseLivePlayback) {
                    tsPlayer = mpegts.createPlayer({
                        type: 'ts', // ZWINGT den Player, es als TS zu verarbeiten (Löst das Fiko4k Problem!)
                        isLive: true,
                        url: url
                    }, {
                        enableWorker: true,
                        liveBufferLatencyChasing: true
                    });
                    tsPlayer.attachMediaElement(video);
                    tsPlayer.load();
                    tsPlayer.play().then(() => {
                        if (spinner) spinner.style.display = 'none';
                        handlePlayback();
                    }).catch((e) => {
                        // Wenn mpegts scheitert, sofort nativer Fallback
                        spielNativ(url);
                    });

                    tsPlayer.on(mpegts.Events.ERROR, () => {
                        if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; }
                        spielNativ(url);
                    });
                } else {
                    spielNativ(url);
                }
            }
        }

        // 4. Der "Rettungs-Anker" (Nativer HTML5 Player)
        function spielNativ(url) {
            video.src = url;
            video.play().then(() => {
                if (spinner) spinner.style.display = 'none';
                handlePlayback();
            }).catch((e) => {
                console.log("Stream konnte auch nativ nicht gestartet werden.", e);
            });
        }
        // --- ENDE SUPER-PLAYER-CODE ---

        // Autoplay Policy Handling
        document.addEventListener('click', () => { hasInteracted = true; handlePlayback(); });
        document.addEventListener('keydown', () => { hasInteracted = true; handlePlayback(); });

        function handlePlayback() {
            if (hasInteracted) {
                video.muted = false; 
                video.play().catch(()=>{});
                msg.style.display = 'none';
            } else {
                video.muted = true; // Video muss gemutet sein um Autoplay zu erzwingen, bevor Nutzer klickt
                video.play().catch(()=>{});
                msg.innerHTML = 'Ses için ekrana dokun veya OK tuşuna bas';
                msg.style.display = 'block';
            }
        }

        function handleCommand(cmd) {
            if (!cmd || cmd.startsWith('INDEX:')) return;
            
            if (cmd.startsWith('SETLIST:')) {
                const parts = cmd.slice(8).split('~~~');
                urlList = parts[0] ? parts[0].split('||') : [];
                nameList = parts[1] ? parts[1].split('||') : [];
                currentIndex = parts[2] ? parseInt(parts[2]) : 0;
                
                if (urlList[currentIndex]) {
                    startStream(urlList[currentIndex]);
                    showChannelInfo(nameList[currentIndex] || '?', currentIndex);
                }
            } else if (cmd.startsWith('PLAY:')) {
                startStream(cmd.slice(5));
            } else if (cmd.includes('://')) {
                startStream(cmd);
            }
        }

        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {}
        }, 300);
    </script>
</body>
</html>
