<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.11/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rx-player@3.31.0/dist/rx-player.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dashjs@latest/dist/dash.all.min.js"></script>
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body,html{width:100%;height:100%;background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;}
        video{position:absolute;width:100%;height:100%;object-fit:contain;z-index:1;}

        #spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            z-index:300;display:none;flex-direction:column;align-items:center;gap:14px;}
        #spinCircle{width:56px;height:56px;border:5px solid rgba(255,255,255,0.1);
            border-top:5px solid #e50914;border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
        
        #msg{position:relative;z-index:100;color:#fff;font-family:sans-serif;font-size:20px;
            background:rgba(0,0,0,0.7);padding:15px 25px;border-radius:12px;display:none;text-align:center;}
        
        /* Debug Info */
        #active-lib { position: fixed; top: 10px; right: 10px; z-index: 500; color: #0f0; font-family: monospace; font-size: 12px; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<video id="video" playsinline autoplay></video>
<div id="spinner">
    <div id="spinCircle"></div>
</div>
<div id="msg"></div>
<div id="active-lib">Bereit</div>

<script>
    const video = document.getElementById('video');
    const spinner = document.getElementById('spinner');
    const msg = document.getElementById('msg');
    const libTag = document.getElementById('active-lib');

    let hls=null, ts=null, rx=null, shakaPlayer=null, dashPlayer=null;
    let attemptId=0, activeUrl="", currentCmd="";

    function stop() {
        if(hls){ hls.destroy(); hls=null; }
        if(ts){ ts.unload(); ts.detachMediaElement(); ts.destroy(); ts=null; }
        if(rx){ rx.stop(); rx=null; }
        if(shakaPlayer){ shakaPlayer.destroy(); shakaPlayer=null; }
        if(dashPlayer){ dashPlayer.reset(); dashPlayer=null; }
        video.pause(); video.removeAttribute('src'); video.load();
    }

    function win(lib) {
        spinner.style.display='none';
        libTag.innerText = "Lib: " + lib;
        console.log("Erfolg mit: " + lib);
    }

    // --- Player Implementierungen ---

    function tryMpegts(url, cb, err) {
        if(!mpegts.getFeatureList().mseLivePlayback) return err();
        ts = mpegts.createPlayer({type:'mse', isLive:true, url:url});
        ts.attachMediaElement(video);
        ts.load();
        ts.play().then(cb).catch(err);
        setTimeout(() => { if(video.readyState < 2 && ts) err(); }, 8000);
    }

    function tryHLS(url, cb, err) {
        if(!Hls.isSupported()) return err();
        hls = new Hls({enableWorker:true, lowLatencyMode:true});
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().then(cb).catch(err); });
        hls.on(Hls.Events.ERROR, (e,d) => { if(d.fatal) err(); });
    }

    function tryDash(url, cb, err) {
        try {
            dashPlayer = dashjs.MediaPlayer().create();
            dashPlayer.initialize(video, url, true);
            dashPlayer.on(dashjs.MediaPlayer.events.CAN_PLAY, cb);
            dashPlayer.on(dashjs.MediaPlayer.events.ERROR, err);
            setTimeout(() => { if(video.readyState < 2 && dashPlayer) err(); }, 8000);
        } catch(e) { err(); }
    }

    function tryRxPlayer(url, cb, err) {
        try {
            rx = new RxPlayer({videoElement:video});
            rx.loadVideo({url:url, transport:'directfile'});
            rx.addEventListener('playerStateChange', (s) => { if(s==='PLAYING') cb(); });
            rx.addEventListener('error', err);
        } catch(e) { err(); }
    }

    function tryShaka(url, cb, err) {
        shakaPlayer = new shaka.Player(video);
        shakaPlayer.load(url).then(cb).catch(err);
    }

    function tryNative(url, cb, err) {
        video.src = url;
        video.play().then(cb).catch(err);
    }

    // --- Strategie-Verwaltung ---

    function startStream(url) {
        attemptId++;
        const thisAttempt = attemptId;
        stop();
        activeUrl = url;
        spinner.style.display='flex';
        msg.style.display='none';

        const g = (fn) => { return () => { if(thisAttempt === attemptId) fn(); }; };
        const lose = g(() => { 
            spinner.style.display='none'; 
            msg.innerText="Format nicht unterstützt"; 
            msg.style.display='block'; 
        });

        // REIHENFOLGE: mpegts -> HLS -> DASH -> Rx -> SHAKA -> NATIVE
        tryMpegts(url, g(()=>win('mpegts')), 
            g(()=>tryHLS(url, g(()=>win('HLS')), 
                g(()=>tryDash(url, g(()=>win('Dash')),
                    g(()=>tryRxPlayer(url, g(()=>win('RxPlayer')),
                        g(()=>tryShaka(url, g(()=>win('Shaka')), 
                            g(()=>tryNative(url, g(()=>win('Native')), lose))
                        ))
                    ))
                ))
            ))
        );
    }

    // --- VERBESSERUNG: Stall Detection (Auto-Recovery) ---
    let lastTime = 0;
    setInterval(() => {
        if(!video.paused && video.readyState >= 2) {
            if(video.currentTime === lastTime) {
                // Video hängt fest!
                console.log("Stall erkannt, versuche Recovery...");
                const currentPos = video.currentTime;
                video.currentTime = currentPos + 0.1; // Kleiner Schubs für den Puffer
            }
            lastTime = video.currentTime;
        }
    }, 3000);

    // --- AppInventor Kommunikation ---
    setInterval(() => {
        try {
            const cmd = window.AppInventor.getWebViewString();
            if(cmd && cmd !== currentCmd) {
                currentCmd = cmd;
                if(cmd.startsWith("PLAY:")) startStream(cmd.slice(5));
            }
        } catch(e){}
    }, 400);

    window.onclick = () => { video.muted = false; };
</script>
</body>
</html>
