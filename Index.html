<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>

<style>
body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;}
video{position:absolute;width:100%;height:100%;object-fit:contain;z-index:1;}
#spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;width:56px;height:56px;border:5px solid rgba(255,255,255,0.15);border-top:5px solid #e50914;border-radius:50%;display:none;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
#msg{position:relative;z-index:100;color:#fff;font-family:sans-serif;font-size:20px;font-weight:bold;text-align:center;background:rgba(0,0,0,0.75);padding:22px;border-radius:14px;border:2px solid rgba(255,255,255,0.2);}
#channelInfo{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;color:#fff;font-family:sans-serif;font-size:19px;font-weight:bold;background:rgba(0,0,0,0.78);padding:9px 22px;border-radius:10px;border:2px solid rgba(255,255,255,0.15);display:none;}
#st{position:fixed;top:10px;left:10px;z-index:300;font-family:sans-serif;font-size:12px;font-weight:bold;padding:6px 12px;border-radius:7px;display:none;}
#st.ok{background:rgba(0,70,0,0.85);color:#00ff00;}
#st.er{background:rgba(70,0,0,0.85);color:#ff4444;}
#st.l{background:rgba(0,0,0,0.8);color:#ffcc00;}
</style>
</head>

<body>

<video id="video" playsinline autoplay muted></video>
<div id="spinner"></div>
<div id="msg"></div>
<div id="channelInfo"></div>
<div id="st"></div>

<script>
const video = document.getElementById('video');
const spinner = document.getElementById('spinner');
const msg = document.getElementById('msg');
const st = document.getElementById('st');

let attemptId = 0;

// 🔍 H.265 Detection
async function detectCodec(url){
    try{
        const r = await fetch(url);
        const t = await r.text();
        if(t.includes('hev1')||t.includes('hvc1')) return 'h265';
        if(t.includes('avc1')) return 'h264';
        return 'unknown';
    }catch(e){
        return 'unknown';
    }
}

// UI
function setStatus(text, cls){
    st.innerText = text;
    st.className = cls;
    st.style.display='block';
    setTimeout(()=>st.style.display='none',5000);
}

// STOP
function stopAll(){
    if(window._H){try{_H.destroy()}catch(e){}}
    if(window._T){try{_T.destroy()}catch(e){}}
    video.src='';
}

// HLS
function tryHLS(url, ok, fail){
    if(!Hls.isSupported()){fail();return;}
    const h = new Hls();
    window._H = h;
    h.loadSource(url);
    h.attachMedia(video);

    h.on(Hls.Events.MANIFEST_PARSED, ()=>ok());
    h.on(Hls.Events.ERROR, ()=>fail());
}

// TS
function tryTS(url, ok, fail){
    if(!mpegts.getFeatureList().mseLivePlayback){fail();return;}
    const p = mpegts.createPlayer({type:'mse',url});
    window._T = p;
    p.attachMediaElement(video);
    p.load();
    setTimeout(ok,2000);
}

// Native
function tryNative(url, ok, fail){
    video.src=url;
    video.oncanplay=ok;
    video.onerror=fail;
}

// 🚀 MAIN
async function startStream(url){

    attemptId++;
    const id = attemptId;

    stopAll();
    spinner.style.display='block';
    setStatus('Lade...','l');

    const xtream = url.match(/^(https?:\/\/[^/]+)\/([^/]+)\/([^/]+)\/(\d+)$/);

    // XTREAM MAGIC
    if(xtream){
        const host=xtream[1];
        const user=xtream[2];
        const pass=xtream[3];
        const idd=xtream[4];

        const hls = `${host}/live/${user}/${pass}/${idd}.m3u8`;
        const ts  = `${host}/live/${user}/${pass}/${idd}.ts`;

        const codec = await detectCodec(hls);

        if(codec==='h265'){
            spinner.style.display='none';
            setStatus('❌ H265 NICHT SUPPORTET','er');
            return;
        }

        tryHLS(hls,
            ()=>{
                if(id!==attemptId)return;
                spinner.style.display='none';
                setStatus('✅ HLS','ok');
            },
            ()=>tryTS(ts,
                ()=>{
                    if(id!==attemptId)return;
                    spinner.style.display='none';
                    setStatus('✅ TS','ok');
                },
                ()=>tryNative(ts,
                    ()=>{
                        spinner.style.display='none';
                        setStatus('✅ Native','ok');
                    },
                    ()=>{
                        spinner.style.display='none';
                        setStatus('❌ Geht nicht','er');
                    }
                )
            )
        );

    } else {

        // NORMAL
        if(url.includes('.m3u8')){
            const codec = await detectCodec(url);

            if(codec==='h265'){
                spinner.style.display='none';
                setStatus('❌ H265 NICHT SUPPORTET','er');
                return;
            }

            tryHLS(url,
                ()=>{
                    spinner.style.display='none';
                    setStatus('✅ HLS','ok');
                },
                ()=>{
                    spinner.style.display='none';
                    setStatus('❌ Fehler','er');
                }
            );
        } else {
            tryTS(url,
                ()=>{
                    spinner.style.display='none';
                    setStatus('✅ TS','ok');
                },
                ()=>{
                    spinner.style.display='none';
                    setStatus('❌ Fehler','er');
                }
            );
        }
    }
}

// TEST
startStream("http://4kblue8k.xyz:2095/argu.1958/e19059078b0e25a7/22596");

</script>
</body>
</html>
