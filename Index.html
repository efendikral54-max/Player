<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Multi-Engine Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; background: #000; }
        #spinner { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 10; width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #e50914; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
        #msg { position: relative; z-index: 20; color: white; font-family: sans-serif; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; display: none; text-align: center; }
        #info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 30; color: white; font-family: sans-serif; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px; display: none; }
    </style>
</head>
<body>

    <video id="video" playsinline autoplay title="IPTV Player"></video>
    <div id="spinner"></div>
    <div id="msg"></div>
    <div id="info"></div>

    <script>
        const video = document.getElementById('video');
        const spinner = document.getElementById('spinner');
        const msg = document.getElementById('msg');
        const info = document.getElementById('info');

        let hls = null;
        let tsPlayer = null;
        let currentUrl = '';
        let urlList = [], nameList = [], currentIndex = 0;
        let isInteracted = false;

        // --- ENGINE LOGIK ---

        function stopAll() {
            if (hls) { hls.destroy(); hls = null; }
            if (tsPlayer) { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); tsPlayer = null; }
            video.pause();
            video.removeAttribute('src');
            video.load();
        }

        async function startStream(url) {
            if (!url) return;
            currentUrl = url.trim();
            stopAll();
            spinner.style.display = 'block';
            console.log("Versuche Stream:", currentUrl);

            const lo = currentUrl.toLowerCase();

            // 1. Check: Ist es ein direkter MP4/MKV Link?
            if (lo.endsWith('.mp4') || lo.endsWith('.mkv')) {
                tryNative(currentUrl, "MP4 Mode");
                return;
            }

            // 2. Check: Ist es HLS (.m3u8 oder Tulix-Muster)?
            if (lo.includes('.m3u8') || lo.includes('tracks-v') || lo.includes('mono.m3u8')) {
                tryHls(currentUrl);
                return;
            }

            // 3. Check: Ist es ein Xtream/Fiko Link (meist MPEG-TS)?
            // Erkennt Muster wie :8080/username/password/12345
            const xtreamPattern = /:\d+\/[^/]+\/[^/]+\/\d+$/;
            if (xtreamPattern.test(currentUrl) || lo.includes('extension=ts')) {
                tryTs(currentUrl);
                return;
            }

            // 4. Fallback: Wenn wir nicht wissen was es ist, probiere HLS, dann TS, dann Native
            tryHls(currentUrl);
        }

        function tryHls(url) {
            if (Hls.isSupported()) {
                hls = new Hls({ transitionInSync: true, maxBufferLength: 20 });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => playDetected("HLS Engine"));
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.log("HLS Fatal Error, wechsle zu TS...");
                        hls.destroy(); hls = null;
                        tryTs(url);
                    }
                });
            } else {
                tryNative(url, "Native iOS/Safari Mode");
            }
        }

        function tryTs(url) {
            if (mpegts.getFeatureList().mseLivePlayback) {
                tsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
                tsPlayer.attachMediaElement(video);
                tsPlayer.load();
                tsPlayer.play().then(() => playDetected("MPEG-TS Engine")).catch(() => {
                    console.log("TS Error, wechsle zu Native...");
                    tryNative(url, "Native Fallback");
                });
            } else {
                tryNative(url, "Native Fallback");
            }
        }

        function tryNative(url, modeName) {
            console.log("Nutze:", modeName);
            video.src = url;
            video.load();
            video.play()
                .then(() => playDetected(modeName))
                .catch(e => {
                    spinner.style.display = 'none';
                    console.error("Native Playback failed too.");
                });
        }

        function playDetected(engine) {
            spinner.style.display = 'none';
            console.log("Erfolg mit:", engine);
            if (!isInteracted) {
                msg.innerHTML = "Ton aktivieren (OK drücken)";
                msg.style.display = "block";
            }
        }

        // --- INTERAKTION & ZAPPING ---

        window.addEventListener('click', () => {
            isInteracted = true;
            video.muted = false;
            video.play();
            msg.style.display = 'none';
        });

        function showInfo(text) {
            info.textContent = text;
            info.style.display = 'block';
            setTimeout(() => info.style.display = 'none', 3000);
        }

        window.addEventListener('keydown', (e) => {
            if (urlList.length === 0) return;
            // Hoch/Runter Tasten (Standard für Fernbedienungen)
            if (e.keyCode === 38 || e.keyCode === 228) { // Up
                currentIndex = (currentIndex - 1 + urlList.length) % urlList.length;
                zap();
            } else if (e.keyCode === 40 || e.keyCode === 229) { // Down
                currentIndex = (currentIndex + 1) % urlList.length;
                zap();
            }
        });

        function zap() {
            showInfo((currentIndex + 1) + ". " + nameList[currentIndex]);
            startStream(urlList[currentIndex]);
            window.AppInventor.setWebViewString("INDEX:" + currentIndex);
        }

        // --- KOMMUNIKATION MIT KODULAR ---

        setInterval(() => {
            try {
                let cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== "JS_READY") {
                    if (cmd.startsWith("SETLIST:")) {
                        let parts = cmd.slice(8).split("~~~");
                        urlList = parts[0].split("||");
                        nameList = parts[1].split("||");
                        currentIndex = parseInt(parts[2]) || 0;
                        startStream(urlList[currentIndex]);
                        window.AppInventor.setWebViewString("JS_READY"); // Reset
                    } else if (cmd.startsWith("PLAY:")) {
                        startStream(cmd.slice(5));
                        window.AppInventor.setWebViewString("JS_READY");
                    }
                }
            } catch(e) {}
        }, 400);

        window.AppInventor.setWebViewString("JS_READY");

    </script>
</body>
</html>
