<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        
        #spinner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 300; width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #e50914; border-radius: 50%;
            display: none; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        #msg { 
            position: relative; z-index: 100; color: white; 
            font-family: sans-serif; font-size: 22px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.7); 
            padding: 25px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);
        }
        #channelInfo {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 200; color: white; font-family: sans-serif; font-size: 20px;
            font-weight: bold; background: rgba(0,0,0,0.75);
            padding: 10px 24px; border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.15);
            display: none; transition: opacity 0.5s;
        }
        #streamStatus {
            position: fixed; top: 10px; left: 10px; z-index: 300;
            font-family: sans-serif; font-size: 14px; font-weight: bold;
            padding: 8px 14px; border-radius: 8px;
            display: none; transition: opacity 0.8s;
        }
        #streamStatus.yukleniyor { background: rgba(0,0,0,0.75); color: #ffcc00; border: 1px solid #ffcc00; }
        #streamStatus.basarili   { background: rgba(0,80,0,0.8);  color: #00ff00; border: 1px solid #00ff00; }
        #streamStatus.hata       { background: rgba(80,0,0,0.8);  color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="spinner"></div> <div id="msg" style="display:none;"></div>
    <div id="channelInfo"></div>
    <div id="streamStatus"></div>

    <script>
        const video        = document.getElementById('video');
        const spinner      = document.getElementById('spinner');
        const msg          = document.getElementById('msg');
        const channelInfo  = document.getElementById('channelInfo');
        const streamStatus = document.getElementById('streamStatus');

        // Geänderte Variablen für den neuen Player-Code
        let hls = null; 
        let tsPlayer = null; 
        let hasInteracted = false;
        let currentCmd = '';
        let urlList = [], nameList = [], currentIndex = 0;
        let infoTimer = null, statusTimer = null, zappingTimer = null;

        function showStatus(text, type, hideAfter) {
            if (statusTimer) clearTimeout(statusTimer);
            streamStatus.textContent   = text;
            streamStatus.className     = type;
            streamStatus.style.display = 'block';
            streamStatus.style.opacity = '1';
            statusTimer = setTimeout(() => {
                streamStatus.style.opacity = '0';
                setTimeout(() => { streamStatus.style.display = 'none'; }, 800);
            }, hideAfter || 5000);
        }

        function showChannelInfo(name, index) {
            channelInfo.textContent    = (index + 1) + '. ' + name;
            channelInfo.style.display  = 'block';
            channelInfo.style.opacity  = '1';
            if (infoTimer) clearTimeout(infoTimer);
            infoTimer = setTimeout(() => {
                channelInfo.style.opacity = '0';
                setTimeout(() => { channelInfo.style.display = 'none'; }, 500);
            }, 3000);
        }

        function forcePlay() {
            hasInteracted = true;
            video.muted = false;
            video.volume = 1.0;
            video.play().catch(()=>{});
            msg.style.display = 'none';
        }
        window.addEventListener('click', forcePlay);

        window.addEventListener('keydown', function(e) {
            if (!hasInteracted) forcePlay();
            if (urlList.length === 0) return;

            if (e.keyCode === 40 || e.keyCode === 229) { 
                currentIndex = (currentIndex + 1) % urlList.length;
                handleZapping();
            } else if (e.keyCode === 38 || e.keyCode === 228) { 
                currentIndex = (currentIndex - 1 + urlList.length) % urlList.length;
                handleZapping();
            }
        });

        function handleZapping() {
            showChannelInfo(nameList[currentIndex] || '?', currentIndex);
            window.AppInventor.setWebViewString('INDEX:' + currentIndex);
            if (zappingTimer) clearTimeout(zappingTimer);
            zappingTimer = setTimeout(() => {
                startStream(urlList[currentIndex]);
            }, 100);
        }

        // --- DEIN NEUER SUPER-PLAYER CODE START ---

        function startStream(url) {
            const video = document.querySelector('video');
            const spinner = document.getElementById('spinner');
            const msg = document.getElementById('msg');
            
            if (spinner) spinner.style.display = 'block';
            showStatus('⏳ Yayın yükleniyor...', 'yukleniyor', 15000);

            // 1. Alte Player sauber beenden
            if (hls) { hls.destroy(); hls = null; }
            if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; }
            video.src = '';
            video.removeAttribute('src');
            video.load();

            // 2. Ist es eine M3U8 (HLS) Datei oder ein PHP-Proxy?
            if (url.includes('.m3u8') || url.includes('m3u8') || url.includes('.php')) {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        maxBufferLength: 30,
                        liveSyncDuration: 3,
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        if (spinner) spinner.style.display = 'none';
                        showStatus('✅ Yayın başladı (HLS)', 'basarili', 5000);
                        handlePlayback();
                    });

                    // Fehlerbehandlung für Tulix und Proxy-Streams
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    console.log("CORS oder Netzwerkfehler, nutze nativen Fallback");
                                    hls.destroy();
                                    spielNativ(url);
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    console.log("Stream hakt, versuche Reparatur...");
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    hls.destroy();
                                    spielNativ(url);
                                    break;
                            }
                        }
                    });
                } else {
                    spielNativ(url);
                }
            } 
            // 3. Ist es ein MPEG-TS Stream (oder hat gar keine Endung)
            else {
                if (mpegts.getFeatureList().mseLivePlayback) {
                    tsPlayer = mpegts.createPlayer({
                        type: 'ts', // ZWINGT den Player, es als TS zu verarbeiten
                        isLive: true,
                        url: url
                    }, {
                        enableWorker: true,
                        liveBufferLatencyChasing: true
                    });
                    tsPlayer.attachMediaElement(video);
                    tsPlayer.load();
                    tsPlayer.play().then(() => {
                        if (spinner) spinner.style.display = 'none';
                        showStatus('✅ Yayın başladı (TS)', 'basarili', 5000);
                        handlePlayback();
                    }).catch((e) => {
                        spielNativ(url);
                    });

                    tsPlayer.on(mpegts.Events.ERROR, () => {
                        if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; }
                        spielNativ(url);
                    });
                } else {
                    spielNativ(url);
                }
            }
        }

        function spielNativ(url) {
            const video = document.querySelector('video');
            const spinner = document.getElementById('spinner');
            
            video.src = url;
            video.play().then(() => {
                if (spinner) spinner.style.display = 'none';
