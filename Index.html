<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; }
        video { position:absolute; width:100%; height:100%; object-fit:contain; z-index:1; background:#000; }
        #spinner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:300; width:50px; height:50px; border:5px solid rgba(255,255,255,0.1); border-top:5px solid #00ccff; border-radius:50%; display:none; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
        #msg { position:relative; z-index:100; color:white; font-family:sans-serif; font-size:18px; text-align:center; background:rgba(0,0,0,0.8); padding:20px; border-radius:10px; display:none; border:1px solid #444; }
        #channelInfo { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:200; color:white; font-family:sans-serif; font-size:18px; background:rgba(0,0,0,0.8); padding:8px 20px; border-radius:5px; display:none; }
        #streamStatus { position:fixed; top:10px; left:10px; z-index:300; font-family:monospace; font-size:11px; color:#aaa; padding:5px; background:rgba(0,0,0,0.5); pointer-events:none; }
    </style>
</head>
<body>

<video id="video" playsinline autoplay></video>
<div id="spinner"></div>
<div id="msg"></div>
<div id="channelInfo"></div>
<div id="streamStatus">Bereit</div>

<script>
const video = document.getElementById('video');
const spinner = document.getElementById('spinner');
const msg = document.getElementById('msg');
const statusText = document.getElementById('streamStatus');
const channelInfo = document.getElementById('channelInfo');

let currentUrl = '';
let attemptId = 0;
let hlsInstance = null;
let tsInstance = null;

// Hilfsfunktion: Status anzeigen
function setStatus(txt) { statusText.textContent = txt; console.log(txt); }

function stopPlayers() {
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (tsInstance) { tsInstance.unload(); tsInstance.detachMediaElement(); tsInstance.destroy(); tsInstance = null; }
    video.pause();
    video.src = "";
    video.load();
}

function startStream(url) {
    if (!url) return;
    stopPlayers();
    currentUrl = url;
    attemptId++;
    const thisAttempt = attemptId;
    
    spinner.style.display = 'block';
    msg.style.display = 'none';
    setStatus("Versuche: " + url.split('/')[2]);

    const isHLS = url.includes('.m3u8') || url.includes('proxy.php');
    
    if (isHLS) {
        tryHLS(url, thisAttempt);
    } else {
        tryTS(url, thisAttempt);
    }
}

function tryHLS(url, id) {
    if (!Hls.isSupported()) { tryNative(url, id); return; }
    
    hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(video);
    
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        if (id !== attemptId) return;
        video.play().catch(e => {
            msg.innerHTML = "Klicken für Ton";
            msg.style.display = 'block';
        });
        spinner.style.display = 'none';
        setStatus("HLS aktiv");
    });

    hlsInstance.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) tryNative(url, id);
    });
}

function tryTS(url, id) {
    if (!mpegts.getFeatureList().mseLivePlayback) { tryNative(url, id); return; }
    
    tsInstance = mpegts.createPlayer({
        type: 'mse',
        isLive: true,
        url: url
    }, {
        enableStashBuffer: false,
        liveBufferLatencyChasing: true
    });
    
    tsInstance.attachMediaElement(video);
    tsInstance.load();
    
    // Check für Bilddaten
    let checkVideo = setInterval(() => {
        if (id !== attemptId) { clearInterval(checkVideo); return; }
        if (video.readyState >= 2) {
            video.play();
            spinner.style.display = 'none';
            setStatus("TS aktiv (Codec: " + (video.videoWidth > 0 ? "OK" : "Nur Ton?") + ")");
            clearInterval(checkVideo);
        }
    }, 500);

    tsInstance.on(mpegts.Events.ERROR, () => tryNative(url, id));
    
    // Timeout Fallback
    setTimeout(() => {
        if (id === attemptId && video.readyState < 2) tryNative(url, id);
    }, 8000);
}

function tryNative(url, id) {
    if (id !== attemptId) return;
    setStatus("Native Fallback...");
    video.src = url;
    video.play().then(() => {
        spinner.style.display = 'none';
    }).catch(() => {
        if (id === attemptId) {
            spinner.style.display = 'none';
            setStatus("Fehler: Stream nicht abspielbar");
        }
    });
}

// App Inventor Schnittstelle
setInterval(() => {
    try {
        let cmd = window.AppInventor.getWebViewString();
        if (cmd && cmd !== "") {
            window.AppInventor.setWebViewString(""); // Reset
            if (cmd.includes("://")) startStream(cmd);
        }
    } catch(e) {}
}, 500);

// User Interaktion für Autoplay-Blockade
window.addEventListener('click', () => {
    video.muted = false;
    video.play();
    msg.style.display = 'none';
});
</script>
</body>
</html>
