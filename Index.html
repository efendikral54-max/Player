<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal IPTV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>

<style>
body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; }
video { position:absolute; width:100%; height:100%; object-fit:contain; z-index:1; }
#spinner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:300; width:60px; height:60px; border:5px solid rgba(255,255,255,0.2); border-top:5px solid #e50914; border-radius:50%; display:none; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
#msg { position:relative; z-index:100; color:white; font-family:sans-serif; font-size:22px; font-weight:bold; text-align:center; background:rgba(0,0,0,0.7); padding:25px; border-radius:15px; }
#streamStatus { position:fixed; top:10px; left:10px; z-index:300; font-family:sans-serif; font-size:13px; font-weight:bold; padding:7px 13px; border-radius:8px; display:none; }
</style>
</head>

<body>

<video id="video" playsinline autoplay muted></video>
<div id="spinner"></div>
<div id="msg" style="display:none;"></div>
<div id="streamStatus"></div>

<script>
const video = document.getElementById('video');
const spinner = document.getElementById('spinner');
const msg = document.getElementById('msg');
const streamStatus = document.getElementById('streamStatus');

let attemptId = 0;
let activeUrl = '';

function showStatus(t){ 
    streamStatus.textContent=t; 
    streamStatus.style.display='block'; 
}

function stopAll(){
    if(window._hls){ try{window._hls.destroy()}catch(e){} window._hls=null; }
    if(window._ts){ try{window._ts.destroy()}catch(e){} window._ts=null; }
    video.src='';
}

function applyAudio(){
    video.muted=false;
    video.play().catch(()=>{});
}

// 🔥 DEBUG LOGGING
function log(...a){
    console.log("PLAYER:", ...a);
}

// ================= HLS =================
function doHLS(url, ok, fail){
    if(!Hls.isSupported()){ fail(); return; }

    const hls = new Hls({
        maxBufferLength: 20,
        maxMaxBufferLength: 30,
        fragLoadingTimeOut: 20000,
        manifestLoadingTimeOut: 15000
    });

    window._hls = hls;
    hls.loadSource(url);
    hls.attachMedia(video);

    let done = false;

    const timeout = setTimeout(()=>{
        if(!done){
            log("HLS TIMEOUT");
            fail();
        }
    },15000);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
        if(done) return;
        done = true;
        clearTimeout(timeout);
        log("HLS OK");
        ok();
    });

    hls.on(Hls.Events.ERROR, (e,data)=>{
        log("HLS ERROR:", data);

        if(data.fatal){
            switch(data.type){
                case Hls.ErrorTypes.NETWORK_ERROR:
                    log("retry network");
                    hls.startLoad();
                    break;

                case Hls.ErrorTypes.MEDIA_ERROR:
                    log("recover media");
                    hls.recoverMediaError();
                    break;

                default:
                    log("fatal destroy");
                    fail();
                    break;
            }
        }
    });
}

// ================= TS =================
function doTS(url, ok, fail){
    if(!mpegts.getFeatureList().mseLivePlayback){ fail(); return; }

    const p = mpegts.createPlayer({type:'mse',url,isLive:true});
    window._ts = p;

    p.attachMediaElement(video);
    p.load();

    let success = false;

    const check = setInterval(()=>{
        if(video.readyState >= 2){
            success = true;
            clearInterval(check);
            ok();
        }
    },500);

    setTimeout(()=>{
        if(!success){
            clearInterval(check);
            log("TS FAIL");
            fail();
        }
    },8000);
}

// ================= Native =================
function doNative(url, ok, fail){
    video.src = url;

    const t = setTimeout(()=>{
        fail();
    },10000);

    video.oncanplay = ()=>{
        clearTimeout(t);
        ok();
    };

    video.onerror = ()=>{
        clearTimeout(t);
        fail();
    };
}

// ================= START =================
function startStream(url){
    if(!url) return;

    attemptId++;
    activeUrl = url;

    stopAll();
    spinner.style.display='block';
    showStatus("Loading...");

    // ❗ HTTP WARNUNG
    if(location.protocol === "https:" && url.startsWith("http://")){
        log("BLOCKED MIXED CONTENT:", url);
    }

    function success(type){
        spinner.style.display='none';
        showStatus("OK: "+type);
        applyAudio();
    }

    function fail(){
        spinner.style.display='none';
        showStatus("FAILED");
    }

    const lower = url.toLowerCase();

    if(lower.includes(".m3u8")){
        doHLS(url,
            ()=>success("HLS"),
            ()=>doNative(url,
                ()=>success("Native"),
                fail
            )
        );

    }else{
        doTS(url,
            ()=>success("TS"),
            ()=>doHLS(url,
                ()=>success("HLS"),
                ()=>doNative(url,
                    ()=>success("Native"),
                    fail
                )
            )
        );
    }
}

// TEST BUTTON (optional)
window.onclick = ()=>{
    startStream("https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8");
};

</script>
</body>
</html>
