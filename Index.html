<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        
        #spinner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 300; width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #e50914; border-radius: 50%;
            display: none; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        #channelInfo {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 200; color: white; font-family: sans-serif; font-size: 22px;
            font-weight: bold; background: rgba(0,0,0,0.85);
            padding: 12px 28px; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            display: none; transition: opacity 0.5s;
        }

        #streamStatus {
            position: fixed; top: 20px; left: 20px; z-index: 300;
            font-family: sans-serif; font-size: 14px; font-weight: bold;
            padding: 8px 14px; border-radius: 8px;
            display: none; transition: opacity 0.8s;
        }
        #streamStatus.bilgi      { background: rgba(0,0,0,0.75); color: #fff; border: 1px solid #fff; }
        #streamStatus.hata       { background: rgba(80,0,0,0.8);  color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="spinner"></div>
    <div id="channelInfo"></div>
    <div id="streamStatus"></div>

    <script>
        const video        = document.getElementById('video');
        const spinner      = document.getElementById('spinner');
        const channelInfo  = document.getElementById('channelInfo');
        const streamStatus = document.getElementById('streamStatus');

        let hlsPlayer = null, tsPlayer = null, hasInteracted = false;
        let currentCmd = '';
        let urlList = [], nameList = [], currentIndex = 0;
        let infoTimer = null, statusTimer = null, zappingTimer = null;

        function showStatus(text, type, hideAfter) {
            if (statusTimer) clearTimeout(statusTimer);
            streamStatus.textContent   = text;
            streamStatus.className     = type;
            streamStatus.style.display = 'block';
            streamStatus.style.opacity = '1';
            statusTimer = setTimeout(() => {
                streamStatus.style.opacity = '0';
                setTimeout(() => { streamStatus.style.display = 'none'; }, 800);
            }, hideAfter || 5000);
        }

        function showChannelInfo(name, index) {
            channelInfo.textContent    = (index + 1) + '. ' + name;
            channelInfo.style.display  = 'block';
            channelInfo.style.opacity  = '1';
            if (infoTimer) clearTimeout(infoTimer);
            infoTimer = setTimeout(() => {
                channelInfo.style.opacity = '0';
                setTimeout(() => { channelInfo.style.display = 'none'; }, 500);
            }, 3000);
        }

        function forcePlay() {
            if (!hasInteracted) {
                hasInteracted = true;
                video.muted = false;
                video.volume = 1.0;
                video.play().catch(()=>{});
                streamStatus.style.display = 'none';
            }
        }
        window.addEventListener('click', forcePlay);

        window.addEventListener('keydown', function(e) {
            if (!hasInteracted) forcePlay();
            if (urlList.length === 0) return;

            if (e.keyCode === 40 || e.keyCode === 229) { // İleri
                currentIndex = (currentIndex + 1) % urlList.length;
                handleZapping();
            } else if (e.keyCode === 38 || e.keyCode === 228) { // Geri
                currentIndex = (currentIndex - 1 + urlList.length) % urlList.length;
                handleZapping();
            }
        });

        function handleZapping() {
            showChannelInfo(nameList[currentIndex] || '?', currentIndex);
            window.AppInventor.setWebViewString('INDEX:' + currentIndex);
            if (zappingTimer) clearTimeout(zappingTimer);
            zappingTimer = setTimeout(() => {
                startStream(urlList[currentIndex]);
            }, 200); // 200ms Zapping gecikmesi
        }

        function stopExistingPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer)  {
                tsPlayer.unload(); tsPlayer.detachMediaElement();
                tsPlayer.destroy(); tsPlayer = null;
            }
            video.src = "";
        }

        function startStream(url) {
            if (!url) return;
            stopExistingPlayers();
            spinner.style.display = 'block';

            const lo = url.toLowerCase();
            // Erweitert für sup-4k.org Links und PHP-basierte TS Streams
            const isTS = lo.includes('.ts') || lo.includes('extension=ts') || lo.includes('live.php');

            if (isTS && mpegts.getFeatureList().mseLivePlayback) {
                tsPlayer = mpegts.createPlayer({
                    type: 'mse', isLive: true, url,
                    config: { enableWorker: true, liveBufferLatencyChasing: true }
                });
                tsPlayer.attachMediaElement(video);
                tsPlayer.load();
                tsPlayer.on(mpegts.Events.MEDIA_INFO, () => {
                    spinner.style.display = 'none';
                    video.play();
                });
                tsPlayer.on(mpegts.Events.ERROR, () => {
                    spinner.style.display = 'none';
                    showStatus('❌ Yayın hatası', 'hata', 5000);
                });

            } else if (Hls.isSupported() && (lo.includes('.m3u8') || lo.includes('m3u'))) {
                hlsPlayer = new Hls({ startLevel: -1, enableWorker: true });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                    spinner.style.display = 'none';
                    video.play();
                });
            } else {
                // Standart HTML5 Video (MP4 vb.)
                video.src = url;
                video.load();
                video.oncanplay = () => { spinner.style.display = 'none'; video.play(); };
                video.onerror = () => { spinner.style.display = 'none'; showStatus('❌ Açılamadı', 'hata', 5000); };
            }
        }

        function handleCommand(cmd) {
            if (!cmd || cmd.startsWith('INDEX:')) return;
            if (cmd.startsWith('SETLIST:')) {
                const parts = cmd.slice(8).split('~~~');
                urlList = parts[0].split('||');
                nameList = parts[1].split('||');
                currentIndex = parseInt(parts[2]) || 0;
                startStream(urlList[currentIndex]);
                showChannelInfo(nameList[currentIndex], currentIndex);
            } else if (cmd.startsWith('PLAY:')) {
                startStream(cmd.slice(5));
            } else if (cmd.includes('://')) {
                startStream(cmd);
            }
        }

        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {}
        }, 300);
    </script>
</body>
</html>
