<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dashjs@latest/dist/dash.all.min.js"></script>
    
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; }
        video { position:absolute; width:100%; height:100%; object-fit:contain; z-index:1; }
        #spinner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:300; width:60px; height:60px; border:5px solid rgba(255,255,255,0.2); border-top:5px solid #00ccff; border-radius:50%; display:none; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }
        #msg { position:relative; z-index:100; color:white; font-family:sans-serif; font-size:22px; font-weight:bold; text-align:center; background:rgba(0,0,0,0.7); padding:25px; border-radius:15px; border:2px solid rgba(255,255,255,0.2); display:none;}
        #channelInfo { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:200; color:white; font-family:sans-serif; font-size:20px; font-weight:bold; background:rgba(0,0,0,0.75); padding:10px 24px; border-radius:10px; border:2px solid rgba(255,255,255,0.15); display:none; transition:opacity 0.5s; }
        #streamStatus { position:fixed; top:10px; left:10px; z-index:300; font-family:sans-serif; font-size:13px; font-weight:bold; padding:7px 13px; border-radius:8px; display:none; }
        #streamStatus.yukleniyor { background:rgba(0,0,0,0.75); color:#ffcc00; border:1px solid #ffcc00; }
        #streamStatus.basarili   { background:rgba(0,80,0,0.8);  color:#00ff00; border:1px solid #00ff00; }
        #streamStatus.hata       { background:rgba(80,0,0,0.8);  color:#ff4444; border:1px solid #ff4444; }
    </style>
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<div id="spinner"></div>
<div id="msg"></div>
<div id="channelInfo"></div>
<div id="streamStatus"></div>

<script>
const video       = document.getElementById('video');
const spinner     = document.getElementById('spinner');
const msg         = document.getElementById('msg');
const channelInfo = document.getElementById('channelInfo');
const streamStatus= document.getElementById('streamStatus');

let currentCmd = '';
let urlList = [], nameList = [], currentIndex = 0;
let attemptId = 0;
let activePlayer = null; // Speichert die aktive Player-Instanz ('hls', 'ts', 'dash')

function showStatus(text, type) {
    streamStatus.textContent = text; 
    streamStatus.className = type;
    streamStatus.style.display = 'block';
    if(type !== 'yukleniyor') setTimeout(() => streamStatus.style.display = 'none', 4000);
}

function showChannelInfo(name, index) {
    channelInfo.textContent = (index + 1) + '. ' + name;
    channelInfo.style.display = 'block';
    setTimeout(() => channelInfo.style.display = 'none', 3000);
}

function stopAll() {
    // Alle Player sauber beenden, bevor ein neuer startet
    if (window._hls) { window._hls.destroy(); window._hls = null; }
    if (window._ts) { window._ts.unload(); window._ts.detachMediaElement(); window._ts.destroy(); window._ts = null; }
    if (window._dash) { window._dash.reset(); window._dash = null; }
    video.src = '';
    video.removeAttribute('src');
    video.load();
}

// ------------------- DIE PLAYER LOGIK -------------------

function playHLS(url, fallback) {
    if (!Hls.isSupported()) return fallback();
    const hls = new Hls({ maxBufferLength: 30, autoStartLoad: true });
    window._hls = hls;
    hls.loadSource(url);
    hls.attachMedia(video);
    
    hls.on(Hls.Events.MANIFEST_PARSED, () => success('HLS'));
    hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) fallback(); });
}

function playTS(url, fallback) {
    if (!mpegts.getFeatureList().mseLivePlayback) return fallback();
    const ts = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
    window._ts = ts;
    ts.attachMediaElement(video);
    ts.load();
    
    // Prüfe schnell ob Video läuft
    let check = setInterval(() => {
        if (video.readyState >= 2) { clearInterval(check); success('TS'); }
    }, 300);
    setTimeout(() => { clearInterval(check); if(video.readyState < 2) fallback(); }, 6000);
    
    ts.on(mpegts.Events.ERROR, fallback);
}

function playDASH(url, fallback) {
    const dash = dashjs.MediaPlayer().create();
    window._dash = dash;
    dash.initialize(video, url, true);
    dash.on(dashjs.MediaPlayer.events.PLAYBACK_STARTED, () => success('DASH'));
    dash.on(dashjs.MediaPlayer.events.ERROR, fallback);
}

function playNative(url) {
    video.src = url;
    video.play().then(() => success('Native')).catch(() => {
        spinner.style.display = 'none';
        showStatus('❌ Yayın açılamadı', 'hata');
    });
}

function success(playerName) {
    spinner.style.display = 'none';
    showStatus('✅ ' + playerName + ' aktif', 'basarili');
    video.muted = false;
    video.play().catch(() => { msg.innerText="Klicken für Ton"; msg.style.display='block'; });
}

// ------------------- ROUTING FUNKTION -------------------

function startStream(url) {
    if (!url) return;
    stopAll();
    spinner.style.display = 'block';
    msg.style.display = 'none';
    showStatus('⏳ Yükleniyor...', 'yukleniyor');
    
    const urlLower = url.toLowerCase();

    // 1. Logik: Welcher Stream ist es? Wir nehmen den schnellsten Player für das jeweilige Format!
    if (urlLower.includes('.mpd')) {
        // Dash Streams
        playDASH(url, () => playNative(url));
    } 
    else if (urlLower.includes('.ts') || /:\d+\/.*\/.*\/\d+$/.test(url)) {
        // Xtream Codes (die 4kblue8k Links)
        playTS(url, () => playHLS(url, () => playNative(url)));
    } 
    else {
        // Standard (M3U8 / Tulix / Proxy)
        playHLS(url, () => playTS(url, () => playNative(url)));
    }
}

// ------------------- APP INVENTOR -------------------

function handleCommand(cmd) {
    if (!cmd || cmd.startsWith('INDEX:')) return;
    if (cmd.startsWith('SETLIST:')) {
        const p = cmd.slice(8).split('~~~');
        urlList = p[0] ? p[0].split('||') : [];
        nameList = p[1] ? p[1].split('||') : [];
        currentIndex = p[2] ? parseInt(p[2]) : 0;
        if (urlList[currentIndex]) {
            startStream(urlList[currentIndex]);
            showChannelInfo(nameList[currentIndex]||'?', currentIndex);
        }
    } else if (cmd.includes('://')) {
        startStream(cmd);
    }
}

setInterval(() => {
    try {
        const cmd = window.AppInventor.getWebViewString();
        if(cmd && cmd !== currentCmd){ currentCmd = cmd; handleCommand(cmd); }
    } catch(e) {}
}, 300);

window.onclick = () => { video.muted = false; video.play(); msg.style.display = 'none'; };
</script>
</body>
</html>
