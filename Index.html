<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canli TV Player Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        
        #spinner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 300; width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #e50914; border-radius: 50%;
            display: none; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        #msg { 
            position: relative; z-index: 100; color: white; 
            font-family: sans-serif; font-size: 22px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.7); 
            padding: 25px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);
        }
        #channelInfo {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 200; color: white; font-family: sans-serif; font-size: 20px;
            font-weight: bold; background: rgba(0,0,0,0.75);
            padding: 10px 24px; border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.15);
            display: none; transition: opacity 0.5s;
        }
        #streamStatus {
            position: fixed; top: 10px; left: 10px; z-index: 300;
            font-family: sans-serif; font-size: 14px; font-weight: bold;
            padding: 8px 14px; border-radius: 8px;
            display: none; transition: opacity 0.8s;
        }
        #streamStatus.yukleniyor { background: rgba(0,0,0,0.75); color: #ffcc00; border: 1px solid #ffcc00; }
        #streamStatus.basarili   { background: rgba(0,80,0,0.8);  color: #00ff00; border: 1px solid #00ff00; }
        #streamStatus.hata       { background: rgba(80,0,0,0.8);  color: #ff4444; border: 1px solid #ff4444; }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="spinner"></div> 
    <div id="msg" style="display:none;"></div>
    <div id="channelInfo"></div>
    <div id="streamStatus"></div>

    <script>
        // Initialize Shaka polyfills immediately
        shaka.polyfill.installAll();

        const video        = document.getElementById('video');
        const spinner      = document.getElementById('spinner');
        const msg          = document.getElementById('msg');
        const channelInfo  = document.getElementById('channelInfo');
        const streamStatus = document.getElementById('streamStatus');

        let hlsPlayer = null, tsPlayer = null, shakaPlayer = null;
        let hasInteracted = false, currentCmd = '';
        let urlList = [], nameList = [], currentIndex = 0;
        let infoTimer = null, statusTimer = null, zappingTimer = null;
        let retryCount = 0, currentUrl = '';

        function showStatus(text, type, hideAfter) {
            if (statusTimer) clearTimeout(statusTimer);
            streamStatus.textContent   = text;
            streamStatus.className     = type;
            streamStatus.style.display = 'block';
            streamStatus.style.opacity = '1';
            statusTimer = setTimeout(() => {
                streamStatus.style.opacity = '0';
                setTimeout(() => { streamStatus.style.display = 'none'; }, 800);
            }, hideAfter || 5000);
        }

        function showChannelInfo(name, index) {
            channelInfo.textContent    = (index + 1) + '. ' + name;
            channelInfo.style.display  = 'block';
            channelInfo.style.opacity  = '1';
            if (infoTimer) clearTimeout(infoTimer);
            infoTimer = setTimeout(() => {
                channelInfo.style.opacity = '0';
                setTimeout(() => { channelInfo.style.display = 'none'; }, 500);
            }, 3000);
        }

        function forcePlay() {
            hasInteracted = true;
            video.muted = false;
            video.volume = 1.0;
            video.play().catch(()=>{});
            msg.style.display = 'none';
        }
        window.addEventListener('click', forcePlay);

        window.addEventListener('keydown', function(e) {
            if (!hasInteracted) forcePlay();
            if (urlList.length === 0) return;

            if (e.keyCode === 40 || e.keyCode === 229) { 
                currentIndex = (currentIndex + 1) % urlList.length;
                handleZapping();
            } else if (e.keyCode === 38 || e.keyCode === 228) { 
                currentIndex = (currentIndex - 1 + urlList.length) % urlList.length;
                handleZapping();
            }
        });

        function handleZapping() {
            showChannelInfo(nameList[currentIndex] || '?', currentIndex);
            window.AppInventor.setWebViewString('INDEX:' + currentIndex);
            if (zappingTimer) clearTimeout(zappingTimer);
            zappingTimer = setTimeout(() => {
                startStream(urlList[currentIndex]);
            }, 100);
        }

        function onSuccess() {
            spinner.style.display = 'none';
            showStatus('✅ Yayın başladı', 'basarili', 5000);
            retryCount = 0;
            handlePlayback();
        }

        function onError(reason) {
            retryCount++;
            if (retryCount <= 1) {
                // Try again quickly before giving up completely
                showStatus('Yeniden deneniyor...', 'yukleniyor', 2000);
                setTimeout(() => startStream(currentUrl), 2000);
            } else {
                spinner.style.display = 'none';
                showStatus('❌ Yayın açılamadı', 'hata', 8000);
                retryCount = 0;
            }
        }

        // --- THE WATERFALL ENGINE ---

        function stopExistingPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer)  { try { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); } catch(e){} tsPlayer = null; }
            if (shakaPlayer) { try { shakaPlayer.destroy(); } catch(e){} shakaPlayer = null; }
            video.src = "";
            video.removeAttribute('src');
            video.load();
        }

        function startStream(url) {
            if (!url) return;
            currentUrl = url;
            stopExistingPlayers();
            spinner.style.display = 'block'; 
            showStatus('⏳ Yayın yükleniyor...', 'yukleniyor', 30000);

            const lo = url.toLowerCase();
            
            // 1. HARD BYPASS: If it's Tulix or Fiko, don't even try JS players.
            // Android Native handles CORS issues much better than WebView JS.
            if (lo.includes('tulix.tv') || lo.includes('fiko4k')) {
                tryNative(url, false); // false means no further fallback if native fails
                return;
            }

            // 2. Format Detection
            const isTS = /:\d{4,5}\/[^/]+\/[^/]+\/\d+$/.test(url) || lo.includes('type=m3u_plus') || lo.endsWith('.ts');
            const isHLS = lo.includes('.m3u8');

            // 3. Execution Order
            if (isHLS) {
                tryHLS(url);
            } else if (isTS) {
                tryTS(url);
            } else {
                tryShaka(url); // Unknown format, let Shaka try to figure it out
            }
        }

        // ENGINE A: HLS.js
        function tryHLS(url) {
            if (typeof Hls === 'undefined' || !Hls.isSupported()) return tryShaka(url);
            hlsPlayer = new Hls({ maxBufferLength: 30, enableWorker: true });
            hlsPlayer.loadSource(url);
            hlsPlayer.attachMedia(video);
            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play().then(onSuccess).catch(onSuccess));
            hlsPlayer.on(Hls.Events.ERROR, (e, data) => {
                if (data.fatal) {
                    hlsPlayer.destroy(); hlsPlayer = null;
                    tryShaka(url); // FALLBACK to Shaka
                }
            });
        }

        // ENGINE B: Shaka Player (Extremely resilient)
        function tryShaka(url) {
            if (typeof shaka === 'undefined' || !shaka.Player.isBrowserSupported()) return tryNative(url, false);
            shakaPlayer = new shaka.Player(video);
            shakaPlayer.load(url).then(() => video.play().then(onSuccess).catch(onSuccess)).catch(e => {
                shakaPlayer.destroy(); shakaPlayer = null;
                tryNative(url, false); // FALLBACK to Native
            });
        }

        // ENGINE C: MPEG-TS
        function tryTS(url) {
            if (typeof mpegts === 'undefined' || !mpegts.getFeatureList().mseLivePlayback) return tryNative(url, false);
            tsPlayer = mpegts.createPlayer({ type:'mse', isLive:true, url });
            tsPlayer.attachMediaElement(video);
            tsPlayer.load();
            tsPlayer.on(mpegts.Events.ERROR, (t, d) => {
                try { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); } catch(e) {}
                tsPlayer = null;
                tryNative(url, false); // FALLBACK to Native
            });
            video.play().then(onSuccess).catch(onSuccess);
        }

        // ENGINE D: Native HTML5 (Best for bypassing CORS)
        function tryNative(url, fallbackToTS) {
            video.src = url;
            video.load();
            video.oncanplay = () => video.play().then(onSuccess).catch(onSuccess);
            video.onerror = () => {
                if (fallbackToTS) tryTS(url);
                else onError('Format desteklenmiyor');
            };
            
            // Timeout to prevent endless loading spinner
            setTimeout(() => { 
                if (spinner.style.display !== 'none' && video.readyState > 0) onSuccess(); 
            }, 8000);
        }

        function handlePlayback() {
            if (hasInteracted) {
                video.muted = false; video.play().catch(()=>{});
                msg.style.display = 'none';
            } else {
                video.play().catch(()=>{});
                msg.innerHTML     = 'Ses için OK tuşuna bas';
                msg.style.display = 'block';
            }
        }

        // --- Kodular Communication ---
        function handleCommand(cmd) {
            if (!cmd || cmd.startsWith('INDEX:')) return;
            
            if (cmd.startsWith('SETLIST:')) {
                const parts = cmd.slice(8).split('~~~');
                urlList = parts[0] ? parts[0].split('||') : [];
                nameList = parts[1] ? parts[1].split('||') : [];
                currentIndex = parts[2] ? parseInt(parts[2]) : 0;
                if (urlList[currentIndex]) {
                    startStream(urlList[currentIndex]);
                    showChannelInfo(nameList[currentIndex] || '?', currentIndex);
                }
            } else if (cmd.startsWith('PLAY:')) {
                retryCount = 0; // Reset retries on manual play
                startStream(cmd.slice(5));
            } else if (cmd.includes('://')) {
                retryCount = 0;
                startStream(cmd);
            }
        }

        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {}
        }, 300);
    </script>
</body>
</html>
