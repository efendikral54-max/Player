<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Xtream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body,html{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;}
        video{position:absolute;width:100%;height:100%;object-fit:contain;z-index:1;}
        #spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;width:60px;height:60px;border:6px solid rgba(255,255,255,0.1);border-top:6px solid #e50914;border-radius:50%;display:none;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
        #msg{position:relative;z-index:100;color:#fff;font-family:sans-serif;font-size:18px;text-align:center;background:rgba(0,0,0,0.8);padding:20px;border-radius:10px;display:none;}
        #st{position:fixed;top:10px;left:10px;z-index:300;color:#00ff00;font-family:monospace;font-size:11px;background:rgba(0,0,0,0.5);padding:5px;display:none;}
    </style>
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<div id="spinner"></div>
<div id="msg"></div>
<div id="st"></div>

<script>
const video = document.getElementById('video');
const spinner = document.getElementById('spinner');
const msg = document.getElementById('msg');
const st = document.getElementById('st');

let hls = null, ts = null, attemptId = 0, activeUrl = "";
let urlList = [], nameList = [], currentIndex = 0, currentCmd = "";

function log(m){ st.innerHTML=m; st.style.display="block"; console.log(m); }

function stopPlayers() {
    if(hls){ hls.destroy(); hls=null; }
    if(ts){ ts.unload(); ts.detachMediaElement(); ts.destroy(); ts=null; }
    video.pause(); video.removeAttribute('src'); video.load();
}

// STRATEGIE 1: HLS (Der stabilste Modus für Web)
function playHLS(url, callback) {
    if(!Hls.isSupported()){ callback(); return; }
    hls = new Hls({ enableWorker:true, lowLatencyMode:true, backBufferLength:30 });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); });
    hls.on(Hls.Events.ERROR, (e,data) => { if(data.fatal) callback(); });
}

// STRATEGIE 2: MPEG-TS (Für direkte Xtream-Links)
function playTS(url, callback) {
    if(!mpegts.getFeatureList().mseLivePlayback){ callback(); return; }
    ts = mpegts.createPlayer({type:'mse', isLive:true, url}, {enableStashBuffer:false});
    ts.attachMediaElement(video);
    ts.load();
    ts.play().catch(callback);
    // Timeout falls TS hängen bleibt
    setTimeout(() => { if(video.readyState < 2) callback(); }, 5000);
}

// STRATEGIE 3: Native (Letzte Rettung)
function playNative(url, callback) {
    video.src = url;
    video.play().then(() => log("Native Play")).catch(callback);
}

function startStream(rawUrl) {
    attemptId++;
    const currentAttempt = attemptId;
    stopPlayers();
    spinner.style.display = "block";
    msg.style.display = "none";
    
    let url = rawUrl.trim();
    log("Analysiere Stream...");

    // XTREAM URL TRANSFORMER
    // Erkennt http://host:port/user/pass/id
    const xtreamRegex = /^(https?:\/\/[^/]+)\/([^/]+)\/([^/]+)\/(\d+)$/;
    const match = url.match(xtreamRegex);

    let variants = [];
    if(match) {
        const [full, host, user, pass, id] = match;
        // Variante 1: HLS Umwandlung (Best Chance)
        variants.push({type: 'HLS', url: `${host}/live/${user}/${pass}/${id}.m3u8`});
        // Variante 2: Direkt mit .m3u8 Endung
        variants.push({type: 'HLS', url: `${url}.m3u8`});
        // Variante 3: Original MPEG-TS
        variants.push({type: 'TS', url: url});
    } else {
        variants.push({type: 'HLS', url: url});
        variants.push({type: 'TS', url: url});
        variants.push({type: 'Native', url: url});
    }

    let vIdx = 0;
    function tryNext() {
        if(currentAttempt !== attemptId) return;
        if(vIdx >= variants.length) {
            spinner.style.display = "none";
            msg.innerHTML = "Wiedergabe fehlgeschlagen.<br>Codec nicht unterstützt.";
            msg.style.display = "block";
            return;
        }

        const v = variants[vIdx++];
        log(`Versuche ${v.type}...`);

        if(v.type === 'HLS') playHLS(v.url, tryNext);
        else if(v.type === 'TS') playTS(v.url, tryNext);
        else playNative(v.url, tryNext);
    }

    video.onplaying = () => { 
        if(currentAttempt === attemptId) {
            spinner.style.display = "none"; 
            log("Aktiv: " + variants[vIdx-1].type);
        }
    };
    
    tryNext();
}

// --- AppInventor Kommunikation ---
setInterval(() => {
    try {
        const cmd = window.AppInventor.getWebViewString();
        if(cmd && cmd !== currentCmd) {
            currentCmd = cmd;
            if(cmd.startsWith("SETLIST:")) {
                const p = cmd.slice(8).split('~~~');
                urlList = p[0].split('||');
                nameList = p[1].split('||');
                currentIndex = parseInt(p[2]);
                startStream(urlList[currentIndex]);
            } else if(cmd.startsWith("PLAY:")) {
                startStream(cmd.slice(5));
            }
        }
    } catch(e){}
}, 400);

// Unmute bei Klick
window.onclick = () => { video.muted = false; video.volume = 1.0; };
</script>
</body>
</html>
