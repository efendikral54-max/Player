<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player - Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        #spinner { position: absolute; z-index: 10; width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #e50914; border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #msg { position: absolute; z-index: 20; color: white; background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 8px; display: none; text-align: center; }
        #debug { position: absolute; top: 10px; left: 10px; z-index: 30; color: yellow; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<video id="video" playsinline autoplay></video>
<div id="spinner"></div>
<div id="msg"></div>
<div id="debug" style="display:none;"></div>

<script>
    const video = document.getElementById('video');
    const spinner = document.getElementById('spinner');
    const msg = document.getElementById('msg');
    
    let hls = null;
    let ts = null;
    let lastCmd = "";

    function stopAll() {
        if (hls) { hls.destroy(); hls = null; }
        if (ts) { ts.unload(); ts.detachMediaElement(); ts.destroy(); ts = null; }
        video.pause();
        video.removeAttribute('src');
        video.load();
    }

    function showMessage(text) {
        msg.innerHTML = text;
        msg.style.display = 'block';
        spinner.style.display = 'none';
    }

    function playNative(url) {
        video.src = url;
        video.play().catch(() => {
            showMessage("Oynatılamıyor / Desteklenmeyen Format");
        });
    }

    function playTS(url, fallbackUrl) {
        if (!mpegts.getFeatureList().mseLivePlayback) {
            playNative(fallbackUrl || url);
            return;
        }
        ts = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
        ts.attachMediaElement(video);
        ts.load();
        ts.play().catch(() => playNative(fallbackUrl || url));

        ts.on(mpegts.Events.ERROR, () => {
            stopAll();
            playNative(fallbackUrl || url);
        });
    }

    function playHLS(url, fallbackUrl) {
        if (!Hls.isSupported()) {
            playTS(fallbackUrl, fallbackUrl);
            return;
        }
        hls = new Hls({ enableWorker: true });
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); });
        
        hls.on(Hls.Events.ERROR, (e, data) => {
            if (data.fatal) {
                stopAll();
                playTS(fallbackUrl, fallbackUrl); // Wenn HLS scheitert, probiere TS
            }
        });
    }

    function startStream(rawUrl) {
        stopAll();
        msg.style.display = 'none';
        spinner.style.display = 'block';
        
        const url = rawUrl.trim();
        
        // Simpler Xtream-Check: Aus /user/pass/123 mache /live/user/pass/123.m3u8
        const xtreamMatch = url.match(/^(https?:\/\/[^/]+)\/([^/]+)\/([^/]+)\/(\d+)$/);
        
        if (xtreamMatch) {
            const hlsUrl = `${xtreamMatch[1]}/live/${xtreamMatch[2]}/${xtreamMatch[3]}/${xtreamMatch[4]}.m3u8`;
            // Versuche HLS, wenn das schiefgeht, nutze die Original-URL für TS/Native
            playHLS(hlsUrl, url);
        } 
        else if (url.includes('.m3u8')) {
            playHLS(url, url);
        } 
        else {
            playTS(url, url);
        }
    }

    // Lade-Spinner ausblenden, sobald das Video läuft
    video.onplaying = () => { spinner.style.display = 'none'; msg.style.display = 'none'; };
    
    // Ton anschalten bei Klick
    window.onclick = () => { video.muted = false; };

    // --- Verbindung zu Kodular ---
    setInterval(() => {
        try {
            const cmd = window.AppInventor.getWebViewString();
            if (cmd && cmd !== lastCmd) {
                lastCmd = cmd;
                if (cmd.startsWith("PLAY:")) {
                    startStream(cmd.slice(5));
                } else if (cmd.startsWith("SETLIST:")) {
                    const parts = cmd.slice(8).split('~~~');
                    const urls = parts[0] ? parts[0].split('||') : [];
                    const index = parts[2] ? parseInt(parts[2]) : 0;
                    if (urls[index]) startStream(urls[index]);
                }
            }
        } catch(e) {}
    }, 500);

</script>
</body>
</html>
