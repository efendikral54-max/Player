<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body, html { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Segoe UI',sans-serif; }
#video { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:1; }

#loader {
    position:fixed; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.85); transition:opacity 0.4s;
}
#loader.hidden { opacity:0; pointer-events:none; }
.spinner {
    width:48px; height:48px;
    border:4px solid rgba(255,255,255,0.1); border-top-color:#e50914;
    border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:14px;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loaderText { color:#fff; font-size:17px; font-weight:600; }
#loaderSub  { color:#888; font-size:12px; margin-top:6px; max-width:380px; text-align:center; }

#muteScreen {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.88);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#muteScreen.hidden { display:none; }
#muteScreen .mIcon  { font-size:52px; }
#muteScreen .mTitle { color:#fff; font-size:22px; font-weight:700; text-align:center; }
#muteScreen .mSub   { color:rgba(255,255,255,0.55); font-size:14px; text-align:center; }
#muteBtn {
    margin-top:12px; background:rgba(229,9,20,0.15);
    border:3px solid #e50914; border-radius:14px;
    color:#fff; font-size:18px; font-weight:700;
    padding:18px 48px; cursor:pointer; outline:none; transition:all 0.15s;
}
#muteBtn.focused { background:#e50914; transform:scale(1.05); }

#zapOverlay {
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    z-index:60; background:rgba(0,0,0,0.88);
    border:1px solid rgba(229,9,20,0.5); border-radius:18px;
    padding:14px 32px; min-width:380px; max-width:600px;
    text-align:center; opacity:0; transition:opacity 0.3s; pointer-events:none;
}
#zapOverlay.show { opacity:1; }
#zapPrev { color:#555; font-size:13px; margin-bottom:6px; }
#zapCurr {
    color:#fff; font-size:21px; font-weight:700; padding:8px 0; margin:4px 0;
    border-top:1px solid rgba(255,255,255,0.1); border-bottom:1px solid rgba(255,255,255,0.1);
}
#zapNum { color:#e50914; margin-right:6px; }
#zapNext { color:#555; font-size:13px; margin-top:6px; }

#dimmer { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.72); display:none; }
#dimmer.show { display:block; }

#mainMenu {
    position:fixed; top:50%; right:36px; z-index:110;
    transform:translateY(-50%);
    background:rgba(14,14,14,0.97);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px; padding:20px 16px;
    display:none; flex-direction:column; gap:8px; min-width:290px;
}
#mainMenu.show { display:flex; }
#mainMenu h3 {
    color:#fff; font-size:14px; font-weight:700;
    padding-bottom:10px; margin-bottom:2px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
.mBtn {
    background:rgba(255,255,255,0.06); border:2px solid transparent;
    border-radius:10px; color:#ccc; font-size:14px; font-weight:600;
    padding:13px 16px; text-align:left; cursor:pointer; outline:none;
    display:flex; align-items:center; gap:12px; transition:all 0.12s;
}
.mBtn .ic { font-size:18px; width:24px; text-align:center; }
.mBtn.focused { border-color:#e50914; background:rgba(229,9,20,0.15); color:#fff; }
.mBtn.red { color:#ff7070; }
.mBtn.red.focused { border-color:#ff4444; background:rgba(255,68,68,0.15); color:#ffaaaa; }
.divider { height:1px; background:rgba(255,255,255,0.08); margin:4px 0; }

#listOverlay {
    position:fixed; inset:0; z-index:120;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.75);
}
#listOverlay.show { display:flex; }
#listPanel {
    background:rgba(12,12,12,0.98); border:1px solid rgba(255,255,255,0.12);
    border-radius:20px; width:560px; max-width:92vw;
    padding:22px 0 14px; display:flex; flex-direction:column;
}
#listTitle {
    color:#fff; font-size:15px; font-weight:700;
    padding:0 22px 14px; border-bottom:1px solid rgba(255,255,255,0.08); margin-bottom:6px;
}
.lItem {
    padding:12px 22px; color:#999; font-size:13px; font-weight:500;
    cursor:pointer; transition:all 0.1s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-left:3px solid transparent;
}
.lItem.focused { background:rgba(229,9,20,0.18); color:#fff; border-left-color:#e50914; padding-left:19px; }
.lItem.current { color:#e5a010; }
.lItem.focused.current { background:rgba(229,160,16,0.18); border-left-color:#e5a010; }
#listHint { color:#444; font-size:11px; text-align:center; padding:10px 0 0; }
</style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>

<div id="loader">
    <div class="spinner"></div>
    <div id="loaderText">Yükleniyor...</div>
    <div id="loaderSub"></div>
</div>

<div id="muteScreen">
    <div class="mIcon">🔇</div>
    <div class="mTitle">Ses kapalı</div>
    <div class="mSub">Yayın arka planda başlatılıyor.<br>Devam etmek için sesi açın.</div>
    <button id="muteBtn" class="focused" onclick="doUnmute()">▶  Sesi Aç ve Başlat</button>
</div>

<div id="zapOverlay">
    <div id="zapPrev"></div>
    <div id="zapCurr"><span id="zapNum"></span><span id="zapName"></span></div>
    <div id="zapNext"></div>
</div>

<div id="dimmer"></div>

<div id="mainMenu">
    <h3>📺 Menü</h3>
    <button class="mBtn" data-act="channels"><span class="ic">📋</span>Kanal Seç</button>
    <button class="mBtn" data-act="categories"><span class="ic">🗂️</span>Kategori Seç</button>
    <div class="divider"></div>
    <button class="mBtn" data-act="altplayer"><span class="ic">▶️</span>Harici Player</button>
    <button class="mBtn red" data-act="goback"><span class="ic">⬅️</span>Kanallar'a Dön</button>
    <div class="divider"></div>
    <button class="mBtn" data-act="closemenu"><span class="ic">✖️</span>Kapat</button>
</div>

<div id="listOverlay">
    <div id="listPanel">
        <div id="listTitle">
            <span id="listIcon"></span><span id="listTitleText"></span>
        </div>
        <div id="listItems"></div>
        <div id="listHint">▲ ▼ gezin  •  OK seç  •  Geri kapat</div>
    </div>
</div>

<script>
const video       = document.getElementById('video');
const loader      = document.getElementById('loader');
const loaderText  = document.getElementById('loaderText');
const loaderSub   = document.getElementById('loaderSub');
const muteScreen  = document.getElementById('muteScreen');
const zapOverlay  = document.getElementById('zapOverlay');
const dimmer      = document.getElementById('dimmer');
const mainMenu    = document.getElementById('mainMenu');
const listOverlay = document.getElementById('listOverlay');
const listItemsEl = document.getElementById('listItems');

// Mod: 'mute' | 'video' | 'menu' | 'channels' | 'categories'
let mode = 'mute', menuFocusIdx = 0, listFocusIdx = 0;
let urlList = [], nameList = [], currentIndex = 0, currentUrl = '';
let categoryList = [];
let xtHost = '', xtUser = '', xtPass = '', isXtreamMode = false;
let hlsPlayer = null, tsPlayer = null;
let retryCount = 0, retryTimer = null, zapTimer = null;
let hasUnmuted = false;

// ══ KRITISCHER FIX: currentCmd wird nach CMD:BACK zurückgesetzt ══
let currentCmd = '';

function toApp(s) { try { window.AppInventor.setWebViewString(s); } catch(e) {} }

// ── Loader ──────────────────────────────────────────────
function showLoader(t, s) {
    if (mode === 'mute') return;
    loaderText.textContent = t || 'Yükleniyor...';
    loaderSub.textContent  = s || '';
    loader.classList.remove('hidden');
}
function hideLoader() { loader.classList.add('hidden'); }

// ── Zap ─────────────────────────────────────────────────
function hideZap() {
    zapOverlay.classList.remove('show');
    if (zapTimer) { clearTimeout(zapTimer); zapTimer = null; }
}
function updateZap() {
    if (!nameList.length || !hasUnmuted) return;
    const t = nameList.length;
    document.getElementById('zapNum').textContent  = (currentIndex + 1) + '. ';
    document.getElementById('zapName').textContent = nameList[currentIndex] || '';
    document.getElementById('zapPrev').textContent = '▲  ' + (nameList[(currentIndex-1+t)%t] || '');
    document.getElementById('zapNext').textContent = '▼  ' + (nameList[(currentIndex+1)%t]   || '');
    zapOverlay.classList.add('show');
    if (zapTimer) clearTimeout(zapTimer);
    zapTimer = setTimeout(() => zapOverlay.classList.remove('show'), 4000);
}

// ── Ton ─────────────────────────────────────────────────
function doUnmute() {
    hasUnmuted = true;
    video.muted = false; video.volume = 1.0;
    muteScreen.classList.add('hidden');
    mode = 'video';
    if (currentUrl) { retryCount = 0; startStream(currentUrl); }
}

// ── Player ──────────────────────────────────────────────
function stopAll() {
    if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
    if (hlsPlayer) { try { hlsPlayer.destroy(); } catch(e) {} hlsPlayer = null; }
    if (tsPlayer)  {
        try { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); } catch(e) {}
        tsPlayer = null;
    }
    video.src = ''; video.load();
}
function onSuccess() {
    hideLoader(); retryCount = 0;
    video.muted = !hasUnmuted; video.volume = hasUnmuted ? 1.0 : 0.0;
}
function onError(reason) {
    retryCount++;
    if (retryCount <= 3) {
        showLoader('Yeniden bağlanıyor... (' + retryCount + '/3)', reason || '');
        retryTimer = setTimeout(() => startStream(currentUrl), 4000);
    } else { hideLoader(); retryCount = 0; }
}
function startStream(url) {
    if (!url) return;
    currentUrl = url; stopAll();
    if (mode !== 'mute') showLoader('Bağlanıyor...', '');
    const lo    = url.toLowerCase();
    const isTS  = /:\d{4,5}\/[^/]+\/[^/]+\/\d+$/.test(url) ||
                  lo.endsWith('.ts') || lo.includes('type=m3u_plus');
    const isHLS = lo.endsWith('.m3u8') || lo.includes('.m3u8?');
    if (isTS && typeof mpegts !== 'undefined' && mpegts.getFeatureList().mseLivePlayback) loadTS(url);
    else if (isHLS && typeof Hls !== 'undefined' && Hls.isSupported()) loadHLS(url);
    else loadNative(url);
}
function loadHLS(url) {
    hlsPlayer = new Hls({ enableWorker:true, lowLatencyMode:true,
        xhrSetup: xhr => { xhr.withCredentials = false; } });
    hlsPlayer.loadSource(url); hlsPlayer.attachMedia(video);
    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
        video.muted = true; video.play().then(onSuccess).catch(onSuccess);
    });
    hlsPlayer.on(Hls.Events.ERROR, (e, d) => {
        if (d.fatal) { hlsPlayer.destroy(); hlsPlayer = null; loadNative(url); }
    });
}
function loadTS(url) {
    tsPlayer = mpegts.createPlayer({ type:'mse', isLive:true, url });
    tsPlayer.attachMediaElement(video); tsPlayer.load();
    tsPlayer.on(mpegts.Events.ERROR, (t, d) => {
        try { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); } catch(e) {}
        tsPlayer = null; onError(d?.msg || 'TS hatası');
    });
    video.muted = true; video.play().then(onSuccess).catch(onSuccess);
}
function loadNative(url) {
    video.src = url; video.load(); video.muted = true;
    video.oncanplay = () => video.play().then(onSuccess).catch(onSuccess);
    video.onerror   = () => onError('Format desteklenmiyor');
    setTimeout(() => { if (!loader.classList.contains('hidden')) onSuccess(); }, 10000);
}
video.addEventListener('stalled', () => {
    setTimeout(() => {
        if (video.paused && retryCount === 0 && currentUrl && mode === 'video')
            onError('Bağlantı kesildi');
    }, 12000);
});

// ── Zapping ─────────────────────────────────────────────
function zap(dir) {
    if (!urlList.length) return;
    currentIndex = dir === 'up'
        ? (currentIndex - 1 + urlList.length) % urlList.length
        : (currentIndex + 1) % urlList.length;
    startStream(urlList[currentIndex]);
    updateZap();
    // FIX: URL mitschicken damit Kodular global Test setzen kann
    toApp('INDEX:' + currentIndex);
    toApp('SETTEST:' + urlList[currentIndex]);
}

// ── Mod ─────────────────────────────────────────────────
function setMode(m) {
    mode = m;
    const isOverlay = m !== 'video' && m !== 'mute';
    dimmer.classList.toggle('show', isOverlay);
    mainMenu.classList.toggle('show', m === 'menu');
    listOverlay.classList.toggle('show', m === 'channels' || m === 'categories');
    if (isOverlay) hideZap();
    if (m === 'menu')       { menuFocusIdx = 0; updateMenuFocus(); }
    if (m === 'channels')   { listFocusIdx = currentIndex; showChannelList(); }
    if (m === 'categories') { listFocusIdx = 0; showCategoryList(); }
}
function closeAll() { setMode('video'); }

// ── Menü ─────────────────────────────────────────────────
function updateMenuFocus() {
    mainMenu.querySelectorAll('.mBtn').forEach((b, i) =>
        b.classList.toggle('focused', i === menuFocusIdx));
}
function menuNav(dir) {
    const n = mainMenu.querySelectorAll('.mBtn').length;
    menuFocusIdx = Math.max(0, Math.min(n - 1, menuFocusIdx + (dir === 'up' ? -1 : 1)));
    updateMenuFocus();
}
function menuSelect() {
    const act = mainMenu.querySelectorAll('.mBtn')[menuFocusIdx]?.dataset.act;
    if (!act) return;
    closeAll();
    switch(act) {
        case 'channels':   setMode('channels');   break;
        case 'categories': setMode('categories'); break;
        case 'altplayer':  toApp('ALT_PLAYER');   break;
        case 'goback':     toApp('BACK');          break;
        case 'closemenu':  /* bleibt 'video' */   break;
    }
}
mainMenu.querySelectorAll('.mBtn').forEach(b => {
    b.addEventListener('click', () => {
        menuFocusIdx = Array.from(mainMenu.querySelectorAll('.mBtn')).indexOf(b);
        menuSelect();
    });
});
dimmer.addEventListener('click', closeAll);

// ── Liste ─────────────────────────────────────────────────
const VISIBLE = 9;
function renderListItems(list, activeIdx) {
    listItemsEl.innerHTML = '';
    const half  = Math.floor(VISIBLE / 2);
    const start = Math.max(0, Math.min(listFocusIdx - half, Math.max(0, list.length - VISIBLE)));
    const end   = Math.min(start + VISIBLE, list.length);
    for (let i = start; i < end; i++) {
        const d = document.createElement('div');
        d.className = 'lItem'
            + (i === listFocusIdx ? ' focused' : '')
            + (i === activeIdx    ? ' current' : '');
        d.textContent = (i + 1) + '.  ' + (list[i] || '');
        const idx = i;
        d.addEventListener('click', () => { listFocusIdx = idx; listSelect(); });
        listItemsEl.appendChild(d);
    }
}
function showChannelList() {
    document.getElementById('listIcon').textContent      = '📋 ';
    document.getElementById('listTitleText').textContent = 'Kanal Seç (' + nameList.length + ')';
    renderListItems(nameList, currentIndex);
}
function showCategoryList() {
    document.getElementById('listIcon').textContent      = '🗂️ ';
    document.getElementById('listTitleText').textContent = 'Kategori Seç';
    renderListItems(categoryList, -1);
}
function listNav(dir) {
    const list = mode === 'channels' ? nameList : categoryList;
    if (!list.length) return;
    listFocusIdx = Math.max(0, Math.min(list.length - 1,
        listFocusIdx + (dir === 'up' ? -1 : 1)));
    renderListItems(list, mode === 'channels' ? currentIndex : -1);
}
function listSelect() {
    if (mode === 'channels') {
        currentIndex = listFocusIdx;
        closeAll();
        startStream(urlList[currentIndex]);
        updateZap();
        toApp('INDEX:' + currentIndex);
        toApp('SETTEST:' + urlList[currentIndex]);
    } else if (mode === 'categories') {
        const cat = categoryList[listFocusIdx];
        if (!cat) return;
        // Direkt schließen dann laden
        mode = 'video';
        dimmer.classList.remove('show');
        listOverlay.classList.remove('show');
        hideZap();
        loadCategory(cat);
    }
}

// ── Xtream API ───────────────────────────────────────────
function parseXtreamUrl(url) {
    try {
        const host = url.match(/^(https?:\/\/[^/]+)/)?.[1];
        const user = decodeURIComponent(url.match(/[?&]username=([^&]+)/)?.[1] || '');
        const pass = decodeURIComponent(url.match(/[?&]password=([^&]+)/)?.[1] || '');
        return (host && user && pass) ? { host, user, pass } : null;
    } catch(e) { return null; }
}

// Kategorien im Hintergrund laden
async function xtreamLoadCategoriesBackground() {
    try {
        const res  = await fetch(xtHost + '/player_api.php?username='
            + encodeURIComponent(xtUser) + '&password='
            + encodeURIComponent(xtPass) + '&action=get_live_categories');
        const data = await res.json();
        categoryList = data.map(c => c.category_name).filter(Boolean);
    } catch(e) {}
}

// Kanäle im Hintergrund laden (für Kanal Seç, kein Auto-Play)
async function xtreamLoadChannelsBackground(catName) {
    try {
        const catRes  = await fetch(xtHost + '/player_api.php?username='
            + encodeURIComponent(xtUser) + '&password='
            + encodeURIComponent(xtPass) + '&action=get_live_categories');
        const catData = await catRes.json();
        const found   = catData.find(c => (c.category_name || '').trim() === catName.trim());
        if (!found) return;

        const streamRes  = await fetch(xtHost + '/player_api.php?username='
            + encodeURIComponent(xtUser) + '&password='
            + encodeURIComponent(xtPass)
            + '&action=get_live_streams&category_id=' + found.category_id);
        const data = await streamRes.json();

        urlList = []; nameList = [];
        for (const s of data) {
            if (!s.name || !s.stream_id) continue;
            nameList.push(s.name);
            urlList.push(xtHost + '/' + xtUser + '/' + xtPass + '/' + s.stream_id);
        }
        // Index der aktuellen URL finden
        const idx = urlList.findIndex(u => u === currentUrl);
        if (idx >= 0) currentIndex = idx;
        else currentIndex = 0;
    } catch(e) {}
}

// Kategorie wechseln — zeigt danach die Liste
async function loadCategory(cat) {
    hideZap();
    loaderText.textContent = 'Kategori yükleniyor...';
    loaderSub.textContent  = cat;
    loader.classList.remove('hidden');

    if (isXtreamMode) {
        try {
            const catRes  = await fetch(xtHost + '/player_api.php?username='
                + encodeURIComponent(xtUser) + '&password='
                + encodeURIComponent(xtPass) + '&action=get_live_categories');
            if (!catRes.ok) throw new Error('HTTP ' + catRes.status);
            const catData = await catRes.json();
            const found   = catData.find(c => (c.category_name || '').trim() === cat.trim());
            if (!found) throw new Error('Bulunamadı');

            const streamRes  = await fetch(xtHost + '/player_api.php?username='
                + encodeURIComponent(xtUser) + '&password='
                + encodeURIComponent(xtPass)
                + '&action=get_live_streams&category_id=' + found.category_id);
            if (!streamRes.ok) throw new Error('HTTP ' + streamRes.status);
            const data = await streamRes.json();

            urlList = []; nameList = [];
            for (const s of data) {
                if (!s.name || !s.stream_id) continue;
                nameList.push(s.name);
                urlList.push(xtHost + '/' + xtUser + '/' + xtPass + '/' + s.stream_id);
            }
            currentIndex = 0;
            hideLoader();

            // ← Kanalliste anzeigen (kein autoplay!)
            if (urlList.length) {
                listFocusIdx = 0;
                mode = 'channels';
                dimmer.classList.add('show');
                listOverlay.classList.add('show');
                showChannelList();
            }
        } catch(e) { hideLoader(); }
    } else {
        // Normale M3U → Kodular
        hideLoader();
        toApp('CATEGORY:' + cat);
    }
}

// ── Tastatur ─────────────────────────────────────────────
window.addEventListener('keydown', e => {
    const up   = e.key === 'ArrowUp'   || e.keyCode === 38;
    const down = e.key === 'ArrowDown' || e.keyCode === 40;
    const ok   = e.key === 'Enter'     || e.keyCode === 13;
    const back = e.key === 'Escape'    || e.keyCode === 27;

    if (mode === 'mute') {
        if (ok) { e.preventDefault(); doUnmute(); }
        return;
    }
    if (mode === 'video') {
        if (up)   { e.preventDefault(); zap('up'); }
        if (down) { e.preventDefault(); zap('down'); }
        if (ok) { e.preventDefault(); setMode('menu'); }
        return;
    }
    e.preventDefault();
    if (mode === 'menu') {
        if (up)   menuNav('up');
        if (down) menuNav('down');
        if (ok)   menuSelect();
        return;
    }
    if (mode === 'channels' || mode === 'categories') {
        if (up)   listNav('up');
        if (down) listNav('down');
        if (ok)   listSelect();
    }
});

// ── Komut Handler ─────────────────────────────────────────
function handleCommand(cmd) {
    if (!cmd) return;

    // ══ XTREAM_INIT:m3uUrl|||kategori|||startUrl ══
    // Beim Start: Stream direkt starten, Kanäle im Hintergrund laden
    if (cmd.startsWith('XTREAM_INIT:')) {
        const parts   = cmd.slice(12).split('|||');
        const m3uUrl  = parts[0] || '';
        const catName = parts[1] || '';
        const startUrl= parts[2] || '';
        const creds   = parseXtreamUrl(m3uUrl);
        if (!creds) return;
        xtHost = creds.host; xtUser = creds.user; xtPass = creds.pass;
        isXtreamMode = true;
        // Stream DIREKT starten mit der aktuellen URL
        if (startUrl) startStream(startUrl);
        // Kategorien + Kanäle im Hintergrund laden (kein Liste zeigen)
        xtreamLoadCategoriesBackground();
        if (catName) xtreamLoadChannelsBackground(catName);
        return;
    }

    // ══ SETLIST: normale (nicht-Xtream) Listen — Stream starten, keine Liste ══
    if (cmd.startsWith('SETLIST:')) {
        isXtreamMode = false;
        const p = cmd.slice(8).split('~~~');
        urlList      = p[0] ? p[0].split('||').filter(Boolean) : [];
        nameList     = p[1] ? p[1].split('||').filter(Boolean) : [];
        currentIndex = p[2] ? (parseInt(p[2]) || 0) : 0;
        if (currentIndex >= urlList.length) currentIndex = 0;
        retryCount = 0;
        if (urlList[currentIndex]) startStream(urlList[currentIndex]);
        return;
    }

    // ══ NEWLIST: normale Listen nach Kategorie-Wechsel — Liste zeigen ══
    if (cmd.startsWith('NEWLIST:')) {
        isXtreamMode = false;
        const p = cmd.slice(8).split('~~~');
        urlList  = p[0] ? p[0].split('||').filter(Boolean) : [];
        nameList = p[1] ? p[1].split('||').filter(Boolean) : [];
        currentIndex = 0; retryCount = 0;
        hideLoader(); hideZap();
        if (urlList.length) {
            listFocusIdx = 0;
            mode = 'channels';
            dimmer.classList.add('show');
            listOverlay.classList.add('show');
            showChannelList();
        }
        return;
    }

    // Kategoriliste für normale M3U
    if (cmd.startsWith('PARSE_TEXT:')) {
        if (!isXtreamMode) {
            const lines = cmd.slice(11).split('\n');
            const seen  = new Set(); categoryList = [];
            for (const line of lines) {
                if (!line.startsWith('#EXTINF')) continue;
                const m = line.match(/group-title="([^"]*)"/i);
                if (m) {
                    const c = m[1].replace(/[\r\n\t]/g,'').trim();
                    if (c && !seen.has(c)) { seen.add(c); categoryList.push(c); }
                }
            }
        }
        return;
    }

   if (cmd === 'CMD:BACK') {
        // 1. Befehl aus Kodular löschen, damit die Schleife stoppt!
        window.AppInventor.setWebViewString(''); 
        currentCmd = ''; 

        if (mode !== 'video' && mode !== 'mute') {
            closeAll();
        } else if (mode === 'video') {
            setMode('menu');
            // 2. Automatischen 5-Sekunden-Schließen-Timer stoppen
            clearTimeout(menuTimer); 
        }
        return;
    }

    if (cmd.startsWith('PLAY:'))    { retryCount = 0; startStream(cmd.slice(5)); return; }

    // Alles andere ignorieren
    if (cmd === 'BACK' || cmd === 'ALT_PLAYER' || cmd.startsWith('INDEX:') ||
        cmd.startsWith('SETTEST:') || cmd.startsWith('CATEGORY:')) return;
}

setInterval(() => {
    try {
        const cmd = window.AppInventor.getWebViewString();
        if (cmd && cmd !== currentCmd) { currentCmd = cmd; handleCommand(cmd); }
    } catch(e) {}
}, 300);
</script>
</body>
</html>
