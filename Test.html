<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        
        #spinner { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); 
            z-index: 300; width: 60px; height: 60px; 
            border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid #e50914; 
            border-radius: 50%; display: none; animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        #msg { 
            position: relative; z-index: 100; color: white; 
            font-family: sans-serif; font-size: 18px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.8); 
            padding: 15px; border-radius: 10px; border: 2px solid #e50914;
            display: none; max-width: 90%;
        }

        /* DEBUG CONSOLE - Zeigt Fehler direkt im Screen */
        #debug {
            position: fixed; bottom: 10px; left: 10px; z-index: 999;
            color: #0f0; font-family: monospace; font-size: 10px;
            background: rgba(0,0,0,0.6); padding: 5px; pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="spinner"></div>
    <div id="msg"></div>
    <div id="debug">System Bereit</div>

    <script>
        const video   = document.getElementById('video');
        const msg     = document.getElementById('msg');
        const spinner = document.getElementById('spinner');
        const dbg     = document.getElementById('debug');

        let hlsPlayer = null, tsPlayer = null, hasInteracted = false;
        let currentCmd = '';

        // Übernommene Profi-Konfiguration aus Index.html
        const HLS_CONFIG = {
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            enableWorker: true,
            xhrSetup: function(xhr) { xhr.withCredentials = false; }
        };

        function log(t) { dbg.innerText = t; console.log(t); }

        function showError(text) {
            spinner.style.display = 'none';
            msg.innerHTML = text;
            msg.style.display = 'block';
        }

        // WEB WORKER zum Parsen (aus Test.html)
        const workerCode = `
            self.onmessage = function(e) {
                const lines = e.data.split('\\n');
                const seen = new Set();
                const cats = [];
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line.startsWith('#EXTINF')) continue;
                    const m = line.match(/group-title="([^"]*)"/i);
                    if (m) {
                        const cat = m[1].trim();
                        if (cat && !seen.has(cat)) { seen.add(cat); cats.push(cat); }
                    }
                }
                self.postMessage(cats.join('||'));
            };
        `;
        const worker = new Worker(URL.createObjectURL(new Blob([workerCode], {type:'application/javascript'})));
        worker.onmessage = (e) => {
            spinner.style.display = 'none';
            window.AppInventor.setWebViewString('CATEGORIES:' + e.data);
        };

        function stopPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer)  { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); tsPlayer = null; }
            video.src = "";
            video.load();
        }

        // Robuste Fallback-Funktion (Direct Play) aus Index.html
        function tryDirectPlay(url) {
            log("Direct Play Versuch...");
            video.src = url;
            video.load();
            video.oncanplay = () => { spinner.style.display = 'none'; video.play(); };
            video.onerror = () => showError("Yayın formatı desteklenmiyor.");
        }

        function startStream(url) {
            if (!url) return;
            log("Lade: " + url.substring(0, 30) + "...");
            stopPlayers();
            msg.style.display = 'none';
            spinner.style.display = 'block';

            const lo = url.toLowerCase();
            const isTS = lo.includes('.ts') || lo.includes('extension=ts') || lo.includes('live.php');

            if (isTS && mpegts.getFeatureList().mseLivePlayback) {
                log("Mode: MPEG-TS");
                tsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
                tsPlayer.attachMediaElement(video);
                tsPlayer.load();
                tsPlayer.on(mpegts.Events.ERROR, () => tryDirectPlay(url));
                tsPlayer.play().then(() => { spinner.style.display = 'none'; });
            } 
            else if (Hls.isSupported()) {
                log("Mode: HLS");
                hlsPlayer = new Hls(HLS_CONFIG);
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => { spinner.style.display = 'none'; video.play(); });
                hlsPlayer.on(Hls.Events.ERROR, (e, data) => { if(data.fatal) tryDirectPlay(url); });
            } 
            else {
                tryDirectPlay(url);
            }
        }

        // Klick-Aktivierung für Sound (WICHTIG!)
        window.addEventListener('click', () => { 
            hasInteracted = true; 
            video.muted = false; 
            video.play(); 
            msg.style.display = 'none';
        });

        function handleCommand(cmd) {
            log("Cmd: " + cmd.substring(0, 20));
            if (!cmd || cmd.startsWith('CATEGORIES:')) return;

            if (cmd.startsWith('PARSE_TEXT:')) {
                spinner.style.display = 'block';
                worker.postMessage(cmd.slice(11));
            } else if (cmd.startsWith('PLAY:')) {
                startStream(cmd.slice(5));
            } else if (cmd.includes('://')) {
                startStream(cmd);
            }
        }

        // Schnelles Abfrage-Intervall für App Inventor
        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {}
        }, 200);
    </script>
</body>
</html>
