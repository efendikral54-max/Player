<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        
        /* Lade-Spinner */
        #spinner {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            z-index: 300; width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #e50914; border-radius: 50%;
            display: none; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* Nachrichten & Fehler */
        #msg { 
            position: relative; z-index: 100; color: white; 
            font-family: sans-serif; font-size: 22px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.7); 
            padding: 25px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);
            display: none;
        }

        /* Debug Fenster */
        #dbg {
            position: fixed; top: 8px; left: 8px; z-index: 999;
            color: #0f0; font-family: monospace; font-size: 11px;
            background: rgba(0,0,0,0.7); padding: 6px 10px; border-radius: 6px;
            max-width: 500px; word-break: break-all; display: block;
        }

        /* NEUE SENDER-INFO BAR (3 Zeilen) */
        #channelInfo {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 200; color: white; font-family: sans-serif;
            background: rgba(0,0,0,0.85); padding: 15px 30px;
            border-radius: 20px; border: 2px solid #e50914;
            display: none; flex-direction: column; align-items: center;
            min-width: 450px; transition: opacity 0.5s; opacity: 0;
        }
        .chan-row { width: 100%; display: flex; justify-content: center; margin: 2px 0; }
        .prev-next { font-size: 15px; color: #aaa; font-style: italic; opacity: 0.7; }
        .current { 
            font-size: 24px; font-weight: bold; color: #fff; 
            margin: 8px 0; border-top: 1px solid #444; border-bottom: 1px solid #444; 
            padding: 8px 0; width: 100%; text-align: center; 
        }
    </style>
</head>
<body>

    <video id="video" playsinline autoplay muted></video>
    <div id="spinner"></div>
    <div id="msg"></div>
    <div id="dbg">System bereit...</div>

    <div id="channelInfo">
        <div class="chan-row prev-next" id="prevChan"></div>
        <div class="current" id="currChan"></div>
        <div class="chan-row prev-next" id="nextChan"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const spinner = document.getElementById('spinner');
        const msg = document.getElementById('msg');
        const dbg = document.getElementById('dbg');
        const channelInfo = document.getElementById('channelInfo');
        
        let hlsPlayer = null;
        let tsPlayer = null;
        let currentCmd = "";
        let urlList = [];
        let nameList = [];
        let currentIndex = 0;
        let infoTimer = null;
        let hasInteracted = false;

        function log(m, timeout = 5000) {
            dbg.innerText = m;
            console.log(m);
            if(timeout > 0) setTimeout(() => { if(dbg.innerText === m) dbg.innerText = ''; }, timeout);
        }

        function showError(m) {
            msg.innerHTML = m;
            msg.style.display = 'block';
            spinner.style.display = 'none';
        }

        function hideError() {
            msg.style.display = 'none';
        }

        // SENDER-INFO ANZEIGEN (3-Zeilen Logik)
        function showChannelInfo() {
            if (nameList.length === 0) return;

            // Indizes berechnen (mit Loop-Schutz)
            const total = nameList.length;
            const prevIdx = (currentIndex - 1 + total) % total;
            const nextIdx = (currentIndex + 1) % total;

            // Texte in die Felder schreiben
            document.getElementById('prevChan').textContent = "⬅ " + nameList[prevIdx];
            document.getElementById('currChan').textContent = (currentIndex + 1) + ". " + nameList[currentIndex];
            document.getElementById('nextChan').textContent = "➡ " + nameList[nextIdx];

            // Einblenden
            channelInfo.style.display = 'flex';
            setTimeout(() => { channelInfo.style.opacity = '1'; }, 10);

            // Nach 4 Sekunden wieder ausblenden
            if (infoTimer) clearTimeout(infoTimer);
            infoTimer = setTimeout(() => {
                channelInfo.style.opacity = '0';
                setTimeout(() => { channelInfo.style.display = 'none'; }, 500);
            }, 4000);
        }

        function startStream(url) {
            if (!url) return;
            log("Lade: " + url);
            hideError();
            spinner.style.display = 'block';

            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; video.pause(); }

            // Spezial-Check für sup-4k.org / MPEG-TS
            const isTS = url.toLowerCase().includes('extension=ts') || url.toLowerCase().includes('.ts') || url.toLowerCase().includes('live.php');

            if (isTS && mpegts.getFeatureList().mse) {
                tsPlayer = mpegts.createPlayer({ type: 'mse', url: url, isLive: true });
                tsPlayer.attachMediaElement(video);
                tsPlayer.load();
                tsPlayer.play().catch(e => log("TS Play Error"));
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            } 
            else if (Hls.isSupported()) {
                hlsPlayer = new Hls();
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
            } 
            else {
                showError("Format wird nicht unterstützt.");
            }
        }

        video.onplaying = () => { spinner.style.display = 'none'; hideError(); };
        video.onerror = () => { showError("Stream-Fehler oder Link abgelaufen."); };

        // ZAPPING LOGIK
        function handleZapping(direction) {
            if (urlList.length === 0) return;
            if (direction === 'up') currentIndex = (currentIndex - 1 + urlList.length) % urlList.length;
            else currentIndex = (currentIndex + 1) % urlList.length;
            
            startStream(urlList[currentIndex]);
            showChannelInfo(); // Nutzt jetzt die neue 3-Zeilen Anzeige
            window.AppInventor.setWebViewString('INDEX:' + currentIndex);
        }

        // TASTEN-STEUERUNG (TV Fernbedienung)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ChannelUp') handleZapping('up');
            if (e.key === 'ArrowDown' || e.key === 'ChannelDown') handleZapping('down');
            if (e.key === 'Enter' || e.key === 'OK') {
                hasInteracted = true;
                video.muted = false;
                video.play();
                showChannelInfo();
            }
        });

        // BEFEHLE VON APP INVENTOR VERARBEITEN
        function handleCommand(cmd) {
            if (!cmd || cmd.startsWith('CATEGORIES:') || cmd.startsWith('INDEX:')) return;

            if (cmd.startsWith('SETLIST:')) {
                const parts = cmd.slice(8).split('~~~');
                urlList = parts[0] ? parts[0].split('||') : [];
                nameList = parts[1] ? parts[1].split('||') : [];
                currentIndex = parts[2] ? parseInt(parts[2]) : 0;
                
                if (urlList[currentIndex]) {
                    startStream(urlList[currentIndex]);
                    showChannelInfo();
                }
            } 
            else if (cmd.startsWith('PARSE_TEXT:')) {
                parseRawM3U(cmd.slice(11));
            } 
            else if (cmd.startsWith('PLAY:')) {
                startStream(cmd.slice(5));
            } 
            else if (cmd.includes('://')) {
                startStream(cmd);
            }
        }

        // M3U PARSER (Extrahiert Kategorien für die App)
        function parseRawM3U(data) {
            const lines = data.split(/\r?\n/);
            const cats = [];
            const seen = new Set();
            for (let line of lines) {
                if (line.includes('group-title="')) {
                    const match = line.match(/group-title="([^"]+)"/);
                    if (match && !seen.has(match[1])) {
                        seen.add(match[1]);
                        cats.push(match[1]);
                    }
                }
            }
            window.AppInventor.setWebViewString('CATEGORIES:' + cats.join('||'));
        }

        // WebViewString Überwachung
        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {}
        }, 300);

        window.addEventListener('click', () => { hasInteracted = true; video.muted = false; video.play(); });
    </script>
</body>
</html>
