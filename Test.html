<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        #msg { 
            position: relative; z-index: 100; color: white; 
            font-family: sans-serif; font-size: 22px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.7); 
            padding: 25px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);
        }
        #dbg {
            position: fixed; top: 8px; left: 8px; z-index: 999;
            color: #0f0; font-family: monospace; font-size: 11px;
            background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 6px;
            border: 1px solid #0f0; max-width: 80%;
            transition: opacity 1s;
        }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="msg">Yükleniyor...</div>
    <div id="dbg">Hazır</div>

    <script>
        const video = document.getElementById('video');
        const msg   = document.getElementById('msg');
        const dbg   = document.getElementById('dbg');

        let hlsPlayer = null, tsPlayer = null, hasInteracted = false;
        let currentCmd = '';

        function log(txt, hideAfter) {
            dbg.style.opacity = '1';
            dbg.textContent = txt;
            if (hideAfter) {
                setTimeout(() => { dbg.style.opacity = '0'; }, hideAfter);
            }
        }

        function stopExistingPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer)  {
                tsPlayer.unload();
                tsPlayer.detachMediaElement();
                tsPlayer.destroy();
                tsPlayer = null;
            }
            video.src = "";
            video.load();
        }

        function startStream(url) {
            if (!url) return;
            stopExistingPlayers();
            
            const lo = url.toLowerCase();
            
            // Spezielle Erkennung für sup-4k.org und TS-Streams über PHP
            const isTS = lo.includes('.ts') || 
                         lo.includes('extension=ts') || 
                         lo.includes('live.php') || 
                         lo.includes('type=m3u_plus');

            if (isTS && mpegts.getFeatureList().mseLivePlayback) {
                log('MPEG-TS Modu aktif');
                tsPlayer = mpegts.createPlayer({
                    type: 'mse',
                    isLive: true,
                    url: url
                });
                tsPlayer.attachMediaElement(video);
                tsPlayer.load();
                tsPlayer.on(mpegts.Events.ERROR, (e) => {
                    log('TS Hatası: ' + e);
                });
                handlePlayback();
            } 
            else if (Hls.isSupported() && (lo.includes('m3u8') || !lo.includes('workers.dev'))) {
                log('HLS Modu aktif');
                hlsPlayer = new Hls({
                    xhrSetup: function(xhr) { xhr.withCredentials = false; }
                });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                    handlePlayback();
                });
            } else {
                log('Direkt Oynatılıyor');
                video.src = url;
                handlePlayback();
            }
        }

        function handlePlayback() {
            if (hasInteracted) {
                video.muted = false;
                video.play().catch(e => log("Play hatası: " + e));
                msg.style.display = 'none';
            } else {
                video.play().catch(() => {});
                msg.innerHTML = 'Ses için dokun';
                msg.style.display = 'block';
            }
        }

        window.addEventListener('click', () => {
            hasInteracted = true;
            video.muted = false;
            video.play();
            msg.style.display = 'none';
        });

        function parseRawM3U(text) {
            log('Ayrıştırılıyor...');
            const lines = text.split('\n');
            const seen = new Set();
            const cats = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line.startsWith('#EXTINF')) continue;
                
                const m = line.match(/group-title="([^"]*)"/i);
                if (m) {
                    const cat = m[1].replace(/[\r\n\t]/g, '').trim();
                    if (cat && !seen.has(cat)) {
                        seen.add(cat);
                        cats.push(cat);
                    }
                }
            }
            log('Tamamlandı! ' + cats.length + ' kategori bulundu', 3000);
            window.AppInventor.setWebViewString('CATEGORIES:' + cats.join('||'));
        }

        function handleCommand(cmd) {
            if (!cmd) return;
            if (cmd.startsWith('CATEGORIES:')) return;

            if (cmd.startsWith('PARSE_TEXT:')) {
                parseRawM3U(cmd.slice(11));
            } else if (cmd.startsWith('PLAY:')) {
                startStream(cmd.slice(5));
            } else {
                startStream(cmd);
            }
        }

        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {
                log('Hata: ' + e.message, 10000);
            }
        }, 300);
    </script>
</body>
</html>
