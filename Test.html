<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        
        #spinner { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); 
            z-index: 300; width: 60px; height: 60px; 
            border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid #e50914; 
            border-radius: 50%; display: none; animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        #msg { 
            position: relative; z-index: 100; color: white; 
            font-family: sans-serif; font-size: 20px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.8); 
            padding: 20px 30px; border-radius: 12px; border: 2px solid #e50914;
            display: none; max-width: 80%; line-height: 1.4;
        }

        #status {
            position: fixed; top: 10px; left: 10px; z-index: 999;
            color: #0f0; font-family: sans-serif; font-size: 12px;
            background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="spinner"></div>
    <div id="msg"></div>
    <div id="status"></div>

    <script>
        const video   = document.getElementById('video');
        const msg     = document.getElementById('msg');
        const spinner = document.getElementById('spinner');
        const status  = document.getElementById('status');

        let hlsPlayer = null, tsPlayer = null, hasInteracted = false;
        let currentCmd = '';

        // Hochoptimierte HLS Konfiguration aus dem Index.html
        const HLS_CONFIG = {
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            maxBufferSize: 60 * 1024 * 1024,
            manifestLoadingTimeOut: 10000,
            manifestLoadingMaxRetry: 3,
            enableWorker: true,
            xhrSetup: function(xhr) { xhr.withCredentials = false; }
        };

        function showUIStatus(txt) {
            status.style.display = 'block';
            status.textContent = txt;
            setTimeout(() => { status.style.display = 'none'; }, 3000);
        }

        function showError(text) {
            spinner.style.display = 'none';
            msg.innerHTML = text;
            msg.style.display = 'block';
        }

        function hideError() {
            msg.style.display = 'none';
        }

        // WEB WORKER (Parsing bleibt erhalten)
        const workerCode = `
            self.onmessage = function(e) {
                const lines = e.data.split('\\n');
                const seen = new Set();
                const cats = [];
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line.startsWith('#EXTINF')) continue;
                    const m = line.match(/group-title="([^"]*)"/i);
                    if (m) {
                        const cat = m[1].replace(/[\\r\\n\\t]/g, '').trim();
                        if (cat && !seen.has(cat)) { seen.add(cat); cats.push(cat); }
                    }
                }
                self.postMessage(cats.join('||'));
            };
        `;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = (e) => {
            spinner.style.display = 'none';
            window.AppInventor.setWebViewString('CATEGORIES:' + e.data);
        };

        function stopExistingPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer)  { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); tsPlayer = null; }
            video.src = "";
            video.load();
        }

        // Die robuste Logik aus Index.html
        function tryDirectPlay(url) {
            video.src = url;
            video.load();
            video.oncanplay = () => {
                spinner.style.display = 'none';
                handlePlayback();
            };
            video.onerror = () => {
                showError('Yayın oynatılamadı. Sunucu yanıt vermiyor veya format desteklenmiyor.');
            };
        }

        async function startStream(url) {
            if (!url) return;
            stopExistingPlayers();
            hideError();
            spinner.style.display = 'block';

            const lo = url.toLowerCase();
            // Erkennung verbessert
            const isTS = lo.includes('.ts') || lo.includes('extension=ts') || lo.includes('live.php') || lo.includes('type=m3u_plus');

            if (isTS && mpegts.getFeatureList().mseLivePlayback) {
                showUIStatus('MPEG-TS Modu');
                tsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url: url });
                tsPlayer.attachMediaElement(video);
                tsPlayer.load();
                tsPlayer.on(mpegts.Events.MEDIA_INFO, () => { spinner.style.display = 'none'; handlePlayback(); });
                tsPlayer.on(mpegts.Events.ERROR, () => tryDirectPlay(url));
            } 
            else if (Hls.isSupported()) {
                showUIStatus('HLS Modu');
                hlsPlayer = new Hls(HLS_CONFIG);
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => { spinner.style.display = 'none'; handlePlayback(); });
                hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        hlsPlayer.destroy(); hlsPlayer = null;
                        tryDirectPlay(url);
                    }
                });
            } else {
                tryDirectPlay(url);
            }
        }

        function handlePlayback() {
            if (hasInteracted) {
                video.muted = false; 
                video.play().catch(() => {});
            } else {
                video.play().catch(()=>{});
                showError('Sesi açmak için ekrana dokunun');
            }
        }

        window.addEventListener('click', () => { 
            hasInteracted = true; 
            hideError();
            if(video.paused) { video.muted = false; video.play(); }
        });

        function handleCommand(cmd) {
            if (!cmd || cmd.startsWith('CATEGORIES:')) return;
            if (cmd.startsWith('PARSE_TEXT:')) {
                spinner.style.display = 'block';
                worker.postMessage(cmd.slice(11));
            } else if (cmd.startsWith('PLAY:')) {
                startStream(cmd.slice(5));
            } else if (cmd.includes('://')) {
                startStream(cmd);
            }
        }

        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {}
        }, 300);
    </script>
</body>
</html>
