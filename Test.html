<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        video { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        #msg { 
            position: relative; z-index: 100; color: white; 
            font-family: sans-serif; font-size: 22px; font-weight: bold;
            text-align: center; background: rgba(0,0,0,0.7); 
            padding: 25px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2);
        }
        #dbg {
            position: fixed; top: 8px; left: 8px; z-index: 999;
            color: #0f0; font-family: monospace; font-size: 11px;
            background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 6px;
            border: 1px solid #0f0; max-width: 80%; transition: opacity 1s;
        }
    </style>
</head>
<body>
    <video id="video" playsinline autoplay muted></video>
    <div id="msg">Yükleniyor...</div>
    <div id="dbg">Hazır</div>

    <script>
        const video = document.getElementById('video');
        const msg   = document.getElementById('msg');
        const dbg   = document.getElementById('dbg');

        let hlsPlayer = null, tsPlayer = null, hasInteracted = false;
        let currentCmd = '';

        // --- WEB WORKER CODE (Nur Kategorien extrahieren) ---
        const workerCode = `
            self.onmessage = function(e) {
                const lines = e.data.split('\\n');
                const seen = new Set();
                const cats = [];
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line.startsWith('#EXTINF')) continue;
                    const m = line.match(/group-title="([^"]*)"/i);
                    if (m) {
                        const cat = m[1].replace(/[\\r\\n\\t]/g, '').trim();
                        if (cat && !seen.has(cat)) {
                            seen.add(cat);
                            cats.push(cat);
                        }
                    }
                }
                self.postMessage(cats.join('||'));
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        worker.onmessage = function(e) {
            log('Tamamlandı! Kategoriler gönderildi.', 3000);
            window.AppInventor.setWebViewString('CATEGORIES:' + e.data);
        };

        function log(txt, hideAfter) {
            dbg.style.opacity = '1';
            dbg.textContent = txt;
            if (hideAfter) setTimeout(() => { dbg.style.opacity = '0'; }, hideAfter);
        }

        function parseRawM3U(text) {
            log('Ayrıştırılıyor (Worker)...');
            worker.postMessage(text);
        }

        // --- PLAYER LOGIK ---
        function stopExistingPlayers() {
            if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
            if (tsPlayer)  { tsPlayer.unload(); tsPlayer.detachMediaElement(); tsPlayer.destroy(); tsPlayer = null; }
            video.src = "";
        }

        function startStream(url) {
            if (!url) return;
            stopExistingPlayers();
            const lo = url.toLowerCase();
            const isTS = lo.includes('.ts') || lo.includes('extension=ts') || lo.includes('live.php') || lo.includes('type=m3u_plus');

            if (isTS && mpegts.getFeatureList().mseLivePlayback) {
                tsPlayer = mpegts.createPlayer({ type: 'mse', isLive: true, url });
                tsPlayer.attachMediaElement(video);
                tsPlayer.load();
                handlePlayback();
            } else if (Hls.isSupported() && (lo.includes('m3u8') || lo.includes('m3u'))) {
                hlsPlayer = new Hls({ enableWorker: true });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => handlePlayback());
            } else {
                video.src = url;
                handlePlayback();
            }
        }

        function handlePlayback() {
            if (hasInteracted) {
                video.muted = false; video.play().catch(()=>{});
                msg.style.display = 'none';
            } else {
                video.play().catch(()=>{});
                msg.innerHTML = 'Ses için dokun';
                msg.style.display = 'block';
            }
        }

        window.addEventListener('click', () => { hasInteracted = true; video.muted = false; video.play(); msg.style.display = 'none'; });

        function handleCommand(cmd) {
            if (!cmd || cmd.startsWith('CATEGORIES:')) return;
            if (cmd.startsWith('PARSE_TEXT:')) {
                parseRawM3U(cmd.slice(11));
            } else if (cmd.startsWith('PLAY:')) {
                startStream(cmd.slice(5));
            } else if (cmd.includes('://')) {
                startStream(cmd);
            }
        }

        setInterval(() => {
            try {
                const cmd = window.AppInventor.getWebViewString();
                if (cmd && cmd !== currentCmd) {
                    currentCmd = cmd;
                    handleCommand(cmd);
                }
            } catch(e) {}
        }, 300);
    </script>
</body>
</html>
